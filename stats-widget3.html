<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book stack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 40px;
    color: #1a1a1a;
    overflow-x: hidden;
  }
  .wrap { max-width: 100%; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

  .stats-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .stat-label { font-size: 11px; color: #aaa; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-num { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
  .stat-right { text-align: right; }

  /* 3D 스택 */
  .scene {
    position: relative;
    width: 100%;
    height: 380px;
    perspective: 900px;
    perspective-origin: 50% 40%;
  }
  .book3d {
    position: absolute;
    transform-style: preserve-3d;
    cursor: pointer;
    transition: transform 0.25s ease;
  }
  .book3d .face {
    position: relative;
    transform-style: preserve-3d;
  }
  .book3d img {
    display: block;
    border-radius: 1px;
    box-shadow: 14px 10px 28px rgba(0,0,0,0.28);
    backface-visibility: hidden;
  }
  /* 책 두께 (오른쪽 책배) */
  .book3d .side {
    position: absolute;
    top: 0;
    right: 0;
    height: 100%;
    background: linear-gradient(to right, #fdfcf9 0%, #e9e5db 30%, #f7f4ee 55%, #e2ddd2 80%, #efe9df 100%);
    transform-origin: right center;
    border-radius: 0 1px 1px 0;
  }
  /* 책 아래면 */
  .book3d .bottom {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    background: linear-gradient(to bottom, #f2efe8, #ddd8cc);
    transform-origin: center bottom;
  }
  .book3d:hover {
    z-index: 999 !important;
  }

  .book-tip {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(100% + 10px);
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 1000;
  }
  .book3d:hover .book-tip { opacity: 1; }
  .tip-title { font-weight: 600; }
  .tip-sub { color: #aaa; font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
(async () => {
  const wrap = document.getElementById('wrap');
  const year = new Date().getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<div class="loading">${d.error}</div>`; return; }

    const total = (d.fictionTotal||0) + (d.nonfictionTotal||0);

    // 오래된 순 → 뒤(오른쪽 위)부터, 최신이 앞(왼쪽 아래)
    const allBooks = [...(d.fictionCovers||[]), ...(d.nonfictionCovers||[])]
      .filter(b => b.url)
      .sort((a, b) => ((a.date||'9999') < (b.date||'9999') ? -1 : 1));

    wrap.innerHTML = `
      <div class="stats-top">
        <div>
          <div class="stat-label">TOTAL</div>
          <div class="stat-num">${total}</div>
        </div>
        <div class="stat-right">
          <div class="stat-label">THIS MONTH</div>
          <div class="stat-num">${d.thisMonth || 0}</div>
        </div>
      </div>
      <div class="scene" id="scene"></div>
    `;

    const scene = document.getElementById('scene');
    const n = allBooks.length;
    const sceneW = scene.offsetWidth;

    // 판형 다양화: 페이지수 기반 시드로 높이 변화
    const heights = [148, 172, 156, 185, 140, 178, 162, 150, 190, 168];

    allBooks.forEach((book, i) => {
      // i=0(가장 오래됨)이 맨 뒤(오른쪽 위), 마지막이 맨 앞(왼쪽 아래)
      const t = n > 1 ? i / (n - 1) : 1; // 0(뒤) → 1(앞)
      const h = heights[i % heights.length];
      const thickness = 14 + (i * 7) % 14; // 책마다 두께 다르게

      const el = document.createElement('div');
      el.className = 'book3d';
      el.style.zIndex = i + 1;

      // 대각선 배치: 오른쪽 위(뒤) → 왼쪽 아래(앞)
      const x = (1 - t) * (sceneW - 160) ;
      const y = 30 + t * (380 - h - 60);
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.transform = `rotateY(-34deg)`;

      const dateStr = book.date ? new Date(book.date).toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'}) : '';

      el.innerHTML = `
        <div class="book-tip">
          <div class="tip-title">${(book.title||'').replace(/</g,'&lt;')}</div>
          <div class="tip-sub">${(book.author||'')}${dateStr ? ' · ' + dateStr : ''}</div>
        </div>
        <div class="face">
          <img src="${book.url}" style="height:${h}px; width:auto;" loading="lazy">
          <div class="side" style="width:${thickness}px; transform: rotateY(90deg) translateX(${thickness/2}px) translateZ(${thickness/2}px);"></div>
          <div class="bottom" style="height:${thickness}px; transform: rotateX(-90deg) translateY(${thickness/2}px) translateZ(${thickness/2}px);"></div>
        </div>
      `;

      el.addEventListener('mouseenter', () => {
        el.style.transform = `rotateY(-34deg) translateZ(30px)`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = `rotateY(-34deg)`;
      });

      scene.appendChild(el);
    });

  } catch(e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
