<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book stack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 40px;
    color: #1a1a1a;
    overflow-x: hidden;
  }
  .wrap { max-width: 100%; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

  .stats-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .stat-label { font-size: 11px; color: #aaa; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-num { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
  .stat-right { text-align: right; }

  /* 3D 씬 */
  .scene {
    position: relative;
    width: 100%;
    height: 300px;
    perspective: 1100px;
    perspective-origin: 50% 30%;
  }
  .book3d {
    position: absolute;
    transform-style: preserve-3d;
    cursor: pointer;
    transition: transform 0.25s ease;
  }
  .face {
    position: absolute;
    backface-visibility: hidden;
  }
  /* 표지 */
  .face.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 0 2px 2px 0;
  }
  /* 책배 (오른쪽 페이지 단면) */
  .face.right {
    background:
      repeating-linear-gradient(to right,
        #f6f3ec 0px, #f6f3ec 1.5px,
        #e2ddd1 1.5px, #e2ddd1 2.5px);
  }
  /* 윗면 (페이지) */
  .face.top {
    background:
      repeating-linear-gradient(to bottom,
        #f8f5ef 0px, #f8f5ef 1.5px,
        #e5e0d5 1.5px, #e5e0d5 2.5px);
  }

  .book-tip {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(100% + 14px);
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 1000;
  }
  .book3d:hover .book-tip { opacity: 1; }
  .book3d:hover { z-index: 999 !important; }
  .tip-title { font-weight: 600; }
  .tip-sub { color: #aaa; font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
(async () => {
  const wrap = document.getElementById('wrap');
  const year = new Date().getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<div class="loading">${d.error}</div>`; return; }

    const total = (d.fictionTotal||0) + (d.nonfictionTotal||0);

    const allBooks = [...(d.fictionCovers||[]), ...(d.nonfictionCovers||[])]
      .filter(b => b.url)
      .sort((a, b) => ((a.date||'9999') < (b.date||'9999') ? -1 : 1));

    wrap.innerHTML = `
      <div class="stats-top">
        <div>
          <div class="stat-label">TOTAL</div>
          <div class="stat-num">${total}</div>
        </div>
        <div class="stat-right">
          <div class="stat-label">THIS MONTH</div>
          <div class="stat-num">${d.thisMonth || 0}</div>
        </div>
      </div>
      <div class="scene" id="scene"></div>
    `;

    const scene = document.getElementById('scene');
    const n = allBooks.length;
    const sceneW = scene.offsetWidth;

    // 판형: 높이/비율 다양
    const heights = [168, 190, 175, 200, 160, 195, 180, 170, 205, 185];
    const ratios  = [0.68, 0.72, 0.66, 0.70, 0.74, 0.67, 0.71, 0.69, 0.65, 0.73];

    const baseline = 270; // 바닥 y (scene 내)
    const spacing = n > 1 ? Math.min(70, (sceneW - 150) / (n - 1)) : 0;

    // 같은 각도로 통일 (레퍼런스처럼: 오른쪽으로 비스듬 + 살짝 위에서 내려봄)
    const ANGLE = 'rotateX(8deg) rotateY(-42deg)';

    allBooks.forEach((book, i) => {
      // 오래된 책 = 오른쪽 뒤, 최신 = 왼쪽 앞
      const h = heights[i % heights.length];
      const w = Math.round(h * ratios[i % ratios.length]);
      const t = 12 + (i * 5) % 12; // 책 두께 12~23px

      const el = document.createElement('div');
      el.className = 'book3d';
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      el.style.zIndex = i + 1;

      // 바닥 정렬: 모든 책 밑이 baseline
      const x = (n - 1 - i) * spacing + 10;
      el.style.left = x + 'px';
      el.style.top = (baseline - h) + 'px';
      el.style.transform = ANGLE;

      const dateStr = book.date ? new Date(book.date).toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'}) : '';

      el.innerHTML = `
        <div class="book-tip">
          <div class="tip-title">${(book.title||'').replace(/</g,'&lt;')}</div>
          <div class="tip-sub">${(book.author||'')}${dateStr ? ' · ' + dateStr : ''}</div>
        </div>
        <div class="face front" style="width:${w}px; height:${h}px; transform: translateZ(${t/2}px);">
          <img src="${book.url}" loading="lazy">
        </div>
        <div class="face right" style="width:${t}px; height:${h}px; left:50%; margin-left:${-t/2}px; transform: rotateY(90deg) translateZ(${w/2}px);"></div>
        <div class="face top" style="width:${w}px; height:${t}px; top:50%; margin-top:${-t/2}px; transform: rotateX(90deg) translateZ(${h/2}px);"></div>
      `;

      el.addEventListener('mouseenter', () => {
        el.style.transform = `${ANGLE} translateZ(35px)`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = ANGLE;
      });

      scene.appendChild(el);
    });

  } catch(e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
