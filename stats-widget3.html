<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book stack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 40px;
    color: #1a1a1a;
    overflow-x: hidden;
  }
  .wrap { max-width: 100%; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

  .stats-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .stat-label { font-size: 11px; color: #aaa; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-num { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
  .stat-right { text-align: right; }

  /* faux-isometric: 초대형 perspective로 원근 왜곡 제거 */
  .scene {
    position: relative;
    width: 100%;
    height: 340px;
    perspective: 15000px;
    perspective-origin: 50% 50%;
  }
  .book3d {
    position: absolute;
    transform-style: preserve-3d;
    cursor: pointer;
    transition: transform 0.25s ease;
  }
  .face {
    position: absolute;
    backface-visibility: hidden;
  }
  .face.front img {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 0 2px 2px 0;
  }
  .face.right {
    background:
      repeating-linear-gradient(to right,
        #f6f3ec 0px, #f6f3ec 1.5px,
        #e2ddd1 1.5px, #e2ddd1 2.5px);
  }
  .face.top {
    background:
      repeating-linear-gradient(to bottom,
        #f8f5ef 0px, #f8f5ef 1.5px,
        #e5e0d5 1.5px, #e5e0d5 2.5px);
  }

  .book-tip {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(100% + 14px);
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 1000;
  }
  .book3d:hover .book-tip { opacity: 1; }
  .book3d:hover { z-index: 999 !important; }
  .tip-title { font-weight: 600; }
  .tip-sub { color: #aaa; font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
// 이미지 실제 비율 로드
function loadDims(url) {
  return new Promise((resolve) => {
    const im = new Image();
    im.onload = () => resolve(im.naturalWidth / im.naturalHeight);
    im.onerror = () => resolve(0.68);
    im.src = url;
  });
}

(async () => {
  const wrap = document.getElementById('wrap');
  const year = new Date().getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<div class="loading">${d.error}</div>`; return; }

    const total = (d.fictionTotal||0) + (d.nonfictionTotal||0);

    const allBooks = [...(d.fictionCovers||[]), ...(d.nonfictionCovers||[])]
      .filter(b => b.url)
      .sort((a, b) => ((a.date||'9999') < (b.date||'9999') ? -1 : 1));

    wrap.innerHTML = `
      <div class="stats-top">
        <div>
          <div class="stat-label">TOTAL</div>
          <div class="stat-num">${total}</div>
        </div>
        <div class="stat-right">
          <div class="stat-label">THIS MONTH</div>
          <div class="stat-num">${d.thisMonth || 0}</div>
        </div>
      </div>
      <div class="scene" id="scene"></div>
    `;

    const scene = document.getElementById('scene');
    const n = allBooks.length;
    const sceneW = scene.offsetWidth;
    const sceneH = 340;

    // 실제 이미지 비율 모두 로드
    const ratios = await Promise.all(allBooks.map(b => loadDims(b.url)));

    // 기준 높이 고정, 폭은 실제 표지 비율대로 (진짜 판형 차이 반영)
    const BASE_H = 175;

    // 대각선 배치: 최신 책(마지막)이 왼쪽 아래 앞, 오래된 책이 오른쪽 위 뒤
    // 45도 대각선: x/y 간격 동일
    const spacing = n > 1 ? Math.min(
      42,
      (sceneW - 180) / (n - 1),
      (sceneH - BASE_H - 60) / (n - 1)
    ) : 0;
    const spacingX = spacing;
    const spacingY = spacing;

    // 위에서 내려다보는 시점 (rotateX 음수 = 윗면 보임) + 오른쪽 책배 보임
    const ANGLE = 'rotateX(-32deg) rotateY(-40deg)';

    allBooks.forEach((book, i) => {
      const h = BASE_H;
      const w = Math.round(h * ratios[i]);
      // 페이지수 기반 두께: 100p=8px ~ 600p+=28px
      const pages = book.totalPage || 250;
      const t = Math.max(8, Math.min(28, Math.round(8 + (pages - 100) / 500 * 20)));

      const el = document.createElement('div');
      el.className = 'book3d';
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      el.style.zIndex = i + 1;

      // 대각선: i=0(가장 오래됨) 오른쪽 위, i=n-1(최신) 왼쪽 아래
      const back = n - 1 - i; // 뒤쪽 정도 (0=맨앞)
      const x = 10 + back * spacingX;
      const y = 30 + (i * spacingY);
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.transform = ANGLE;

      const dateStr = book.date ? new Date(book.date).toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'}) : '';

      el.innerHTML = `
        <div class="book-tip">
          <div class="tip-title">${(book.title||'').replace(/</g,'&lt;')}</div>
          <div class="tip-sub">${(book.author||'')}${dateStr ? ' · ' + dateStr : ''}</div>
        </div>
        <div class="face front" style="width:${w}px; height:${h}px; transform: translateZ(${t/2}px);">
          <img src="${book.url}" loading="lazy">
        </div>
        <div class="face right" style="width:${t}px; height:${h}px; left:50%; margin-left:${-t/2}px; transform: rotateY(90deg) translateZ(${w/2}px);"></div>
        <div class="face top" style="width:${w}px; height:${t}px; top:50%; margin-top:${-t/2}px; transform: rotateX(90deg) translateZ(${h/2}px);"></div>
      `;

      el.addEventListener('mouseenter', () => {
        el.style.transform = `${ANGLE} translateZ(35px)`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = ANGLE;
      });

      scene.appendChild(el);
    });

  } catch(e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
