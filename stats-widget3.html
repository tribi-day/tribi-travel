<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book stack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 40px;
    color: #1a1a1a;
  }
  .wrap { max-width: 340px; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

  /* 상단 통계 */
  .stats-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .stat-label {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .stat-num {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }
  .stat-right { text-align: right; }

  /* 책 스택 */
  .stack {
    position: relative;
    width: 100%;
  }
  .stack-book {
    position: relative;
    width: 150px;
    margin: 0 auto;
    transition: transform 0.25s ease;
    cursor: pointer;
  }
  .stack-book img {
    width: 100%;
    display: block;
    border-radius: 3px;
    box-shadow:
      0 6px 16px rgba(0,0,0,0.18),
      0 2px 5px rgba(0,0,0,0.12);
  }
  .stack-book:hover {
    transform: translateY(-6px) scale(1.02) !important;
    z-index: 999 !important;
  }

  /* 툴팁 */
  .book-info {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(100% + 8px);
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 1000;
  }
  .stack-book:hover .book-info { opacity: 1; }
  .book-info-title { font-weight: 600; }
  .book-info-sub { color: #aaa; font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
(async () => {
  const wrap = document.getElementById('wrap');
  const year = new Date().getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<div class="loading">${d.error}</div>`; return; }

    const total = (d.fictionTotal||0) + (d.nonfictionTotal||0);

    // 완독일 오래된 순 → 스택은 오래된 게 위(뒤), 최신이 맨 아래(앞)
    const allBooks = [...(d.fictionCovers||[]), ...(d.nonfictionCovers||[])]
      .filter(b => b.url)
      .sort((a, b) => ((a.date||'9999') < (b.date||'9999') ? -1 : 1));

    const rotations = [-5, 4, -3, 6, -6, 3, -4, 5, -2, 4, -5, 3, -3, 5, -4];
    const shiftsX = [-14, 10, -8, 14, -12, 8, -6, 12, -10, 6, -12, 10, -8, 12, -6];

    // 각 책은 하단 일부만 보이고 다음 책이 위를 덮는 구조
    // 오래된 책이 맨 위(뒤), 아래로 갈수록 최신, 마지막 책은 온전히
    const overlap = 78; // 각 책이 보이는 세로(px)

    const booksHTML = allBooks.map((book, i) => {
      const rot = rotations[i % rotations.length];
      const sx = shiftsX[i % shiftsX.length];
      const isLast = i === allBooks.length - 1;
      const mb = isLast ? 0 : -1 * (215 - overlap); // 표지 높이 대략 215px 가정
      const dateStr = book.date ? new Date(book.date).toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'}) : '';
      return `
        <div class="stack-book"
          style="transform: rotate(${rot}deg) translateX(${sx}px); z-index:${i+1}; margin-bottom:${mb}px;">
          <div class="book-info">
            <div class="book-info-title">${(book.title||'').replace(/</g,'&lt;')}</div>
            <div class="book-info-sub">${(book.author||'')}${dateStr ? ' · ' + dateStr : ''}</div>
          </div>
          <img src="${book.url}" alt="${(book.title||'').replace(/"/g,'&quot;')}" loading="lazy">
        </div>
      `;
    }).join('');

    wrap.innerHTML = `
      <div class="stats-top">
        <div>
          <div class="stat-label">TOTAL</div>
          <div class="stat-num">${total}</div>
        </div>
        <div class="stat-right">
          <div class="stat-label">THIS MONTH</div>
          <div class="stat-num">${d.thisMonth || 0}</div>
        </div>
      </div>
      <div class="stack">${booksHTML}</div>
    `;

    // 이미지 로드 후 실제 높이 기반으로 겹침 재계산
    const bookEls = document.querySelectorAll('.stack-book');
    bookEls.forEach((el, i) => {
      const img = el.querySelector('img');
      const apply = () => {
        if (i < bookEls.length - 1) {
          el.style.marginBottom = -(img.offsetHeight - overlap) + 'px';
        }
      };
      if (img.complete) apply();
      else img.addEventListener('load', apply);
    });

  } catch(e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
