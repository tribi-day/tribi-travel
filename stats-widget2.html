<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reading stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 48px;
    color: #1a1a1a;
    overflow-x: hidden;
  }
  .wrap { width: 100%; }

  h1 { font-size: 24px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.5px; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .row:last-of-type { border-bottom: none; }

  /* 바 영역 */
  .bar-section {
    margin-top: 36px;
    width: 100%;
  }
  .books-row {
    display: flex;
    align-items: flex-end;
    width: 100%;
    height: 52px;
    overflow: hidden;
  }
  .book-slot {
    flex: 1;
    height: 40px;
    border-radius: 2px;
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }
  .book-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.18);
  }
  .book-slot.ghost {
    background: #e4e4e4;
    border-radius: 2px;
  }
  .bar-track {
    width: 100%;
    height: 6px;
    background: #ebebeb;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 8px;
  }
  .bar-fill {
    height: 100%;
    background: #1a1a1a;
    border-radius: 20px;
    width: 0%;
    transition: width 1s ease;
  }
  .bar-pct {
    text-align: right;
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
  }

  /* 툴팁 */
  .tipbox {
    display: none;
    position: absolute;
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    bottom: 52px;
    transform: translateX(-50%);
  }
  .tipbox.show { display: block; }
  .tip-title { font-weight: 600; }
  .tip-author { color: #aaa; font-size: 11px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div style="color:#aaa; font-size:14px; padding:40px 0;">불러오는 중...</div>
</div>

<script>
(async () => {
  const wrap = document.getElementById('wrap');
  const now = new Date();
  const year = now.getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<p>${d.error}</p>`; return; }

    const total = (d.fictionTotal || 0) + (d.nonfictionTotal || 0);
    const total5 = (d.fiction5stars || 0) + (d.nonfiction5stars || 0);
    const pct = d.목표권수 ? Math.min(100, Math.round(total / d.목표권수 * 100)) : 0;
    const goal = d.목표권수 || 30;

    // 완독일 오래된 순 정렬 (API에서 date 포함)
    const allCovers = [...(d.fictionCovers || []), ...(d.nonfictionCovers || [])]
      .sort((a, b) => {
        const da = a.date || '9999';
        const db = b.date || '9999';
        return da < db ? -1 : 1;
      });

    const rotations = [-7,-2,5,-5,3,-8,6,-3,4,-6,-4,7,-5,3,-7,5,-3,6,-8,3];
    const transY = [4,-2,5,-4,2,-5,3,-3,1,-4,3,-2,4,-3,2,-4,3,-2,4,-3];

    const slotCount = Math.max(goal, total);

    const booksHTML = Array.from({length: slotCount}).map((_, i) => {
      const book = allCovers[i];
      const rot = rotations[i % rotations.length];
      const ty = transY[i % transY.length];
      if (book) {
        const url = typeof book === 'string' ? book : book.url;
        const title = (typeof book === 'object' && book.title) ? book.title.replace(/'/g,"&#39;") : '';
        const author = (typeof book === 'object' && book.author) ? book.author.replace(/'/g,"&#39;") : '';
        return `<div class="book-slot" style="transform:rotate(${rot}deg) translateY(${ty}px);" data-title="${title}" data-author="${author}">
          <img src="${url}" alt="${title}">
        </div>`;
      } else {
        return `<div class="book-slot ghost" style="transform:rotate(${rot}deg) translateY(${ty}px);"></div>`;
      }
    }).join('');

    wrap.innerHTML = `
      <h1>What did I 📖 read in ${year}?</h1>
      <div class="row"><span>total</span><span>${total} books</span></div>
      <div class="row"><span>goal</span><span>${goal} books</span></div>
      <div class="row"><span>fiction</span><span>${d.fictionTotal||0} books, ${(d.fictionPage||0).toLocaleString()} pages</span></div>
      <div class="row"><span>nonfiction</span><span>${d.nonfictionTotal||0} books, ${(d.nonfictionPage||0).toLocaleString()} pages</span></div>
      <div class="row"><span>5 stars</span><span>${total5} book${total5!==1?'s':''}</span></div>

      <div class="bar-section">
        <div style="position:relative;">
          <div class="books-row">${booksHTML}</div>
          <div class="tipbox" id="tipbox">
            <div class="tip-title" id="tipTitle"></div>
            <div class="tip-author" id="tipAuthor"></div>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
        <div class="bar-pct">${pct}%</div>
      </div>
    `;

    // 바 애니메이션
    setTimeout(() => {
      document.getElementById('barFill').style.width = pct + '%';
    }, 100);

    // 툴팁 이벤트
    document.querySelectorAll('.book-slot[data-title]').forEach(el => {
      el.style.cursor = 'pointer';
      el.addEventListener('mouseenter', (e) => {
        const title = el.dataset.title;
        const author = el.dataset.author;
        if (!title) return;
        const tip = document.getElementById('tipbox');
        document.getElementById('tipTitle').textContent = title;
        document.getElementById('tipAuthor').textContent = author;
        const elRect = el.getBoundingClientRect();
        const parentRect = el.closest('[style*="position:relative"]').getBoundingClientRect();
        tip.style.left = (elRect.left - parentRect.left + elRect.width / 2) + 'px';
        tip.classList.add('show');
      });
      el.addEventListener('mouseleave', () => {
        document.getElementById('tipbox').classList.remove('show');
      });
    });

  } catch(e) {
    wrap.innerHTML = '<p style="color:#aaa">불러올 수 없어요 :(</p>';
  }
})();
</script>
</body>
</html>
