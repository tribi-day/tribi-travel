<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reading stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 32px;
    color: #1a1a1a;
  }
  .wrap { max-width: 100%; margin: 0 auto; }
  .loading { color: #aaa; font-size: 14px; padding: 40px 0; }

  h1 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 24px;
    line-height: 1.3;
    letter-spacing: -0.5px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .row-label { font-size: 14px; color: #1a1a1a; }
  .row-value { font-size: 14px; color: #1a1a1a; text-align: right; }

  /* 바 영역 */
  .bar-section {
    position: relative;
    margin-top: 32px;
    height: 60px;
  }
  .books-layer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    overflow: visible;
  }
  .ghost-book {
    width: 26px;
    height: 40px;
    flex-shrink: 0;
    border-radius: 2px;
    background: #e4e4e4;
    margin-right: -7px;
  }
  .real-book {
    width: 26px;
    height: 40px;
    flex-shrink: 0;
    border-radius: 2px;
    object-fit: cover;
    margin-right: -7px;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.2);
    cursor: pointer;
    position: relative;
  }
  .bar-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: #ebebeb;
    border-radius: 20px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #1a1a1a;
    border-radius: 20px;
    transition: width 1s ease;
  }
  .bar-pct {
    position: absolute;
    bottom: -18px; right: 0;
    font-size: 12px;
    color: #aaa;
  }

  /* 툴팁 */
  .tooltip {
    display: none;
    position: fixed;
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
    max-width: 200px;
    white-space: normal;
    line-height: 1.4;
  }
  .tooltip.show { display: block; }
  .tooltip-title { font-weight: 600; margin-bottom: 2px; }
  .tooltip-author { color: #aaa; font-size: 11px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="ttTitle"></div>
  <div class="tooltip-author" id="ttAuthor"></div>
</div>

<script>
function showTooltip(e, title, author) {
  const tt = document.getElementById('tooltip');
  document.getElementById('ttTitle').textContent = title;
  document.getElementById('ttAuthor').textContent = author;
  tt.classList.add('show');
  moveTooltip(e);
}
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 12;
  let y = e.clientY - 60;
  if (x + 200 > window.innerWidth) x = e.clientX - 210;
  if (y < 8) y = e.clientY + 16;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}
document.addEventListener('mousemove', moveTooltip);
document.addEventListener('click', hideTooltip);

(async () => {
  const wrap = document.getElementById('wrap');
  const now = new Date();
  const year = now.getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();

    if (d.error) {
      wrap.innerHTML = `<div class="loading">${d.error}</div>`;
      return;
    }

    const total = (d.fictionTotal || 0) + (d.nonfictionTotal || 0);
    const total5 = (d.fiction5stars || 0) + (d.nonfiction5stars || 0);
    const pct = d.목표권수 ? Math.min(100, Math.round(total / d.목표권수 * 100)) : 0;
    const allCovers = [...(d.fictionCovers || []), ...(d.nonfictionCovers || [])];
    const goal = d.목표권수 || 30;

    // 실제 표지 + 나머지 ghost 개수 계산
    const realCount = allCovers.length;
    const ghostCount = Math.max(0, goal - realCount);
    const rotations = [-8,-3,5,-6,4,-9,7,-4,6,-7,-5,3,-7,5,-3,8,-4,6,-8,4];
    const transY = [0,-3,2,-5,1,-2,3,-4,0,-3,2,-1,4,-2,1,-3,2,-4,1,-2];

    const realBooksHTML = allCovers.map((book, i) => {
      const rot = rotations[i % rotations.length];
      const ty = transY[i % transY.length];
      const url = typeof book === 'string' ? book : book.url;
      const title = typeof book === 'object' ? (book.title || '') : '';
      const author = typeof book === 'object' ? (book.author || '') : '';
      return `<img class="real-book" src="${url}" alt="${title}"
        style="transform: rotate(${rot}deg) translateY(${ty}px);"
        onmouseenter="showTooltip(event, '${title.replace(/'/g,"\\'")}', '${author.replace(/'/g,"\\'")}')">`;
    }).join('');

    const ghostBooksHTML = Array.from({length: Math.min(ghostCount, 30)}).map((_, i) => {
      const idx = realCount + i;
      const rot = rotations[idx % rotations.length];
      const ty = transY[idx % transY.length];
      return `<div class="ghost-book" style="transform: rotate(${rot}deg) translateY(${ty}px);"></div>`;
    }).join('');

    wrap.innerHTML = `
      <h1>What did I 📖 read in ${year}?</h1>
      <div class="row"><span class="row-label">total</span><span class="row-value">${total} books</span></div>
      <div class="row"><span class="row-label">goal</span><span class="row-value">${goal} books</span></div>
      <div class="row"><span class="row-label">fiction</span><span class="row-value">${d.fictionTotal || 0} books, ${(d.fictionPage || 0).toLocaleString()} pages</span></div>
      <div class="row"><span class="row-label">nonfiction</span><span class="row-value">${d.nonfictionTotal || 0} books, ${(d.nonfictionPage || 0).toLocaleString()} pages</span></div>
      <div class="row"><span class="row-label">5 stars</span><span class="row-value">${total5} book${total5 !== 1 ? 's' : ''}</span></div>

      <div class="bar-section">
        <div class="books-layer">
          ${realBooksHTML}
          ${ghostBooksHTML}
        </div>
        <div class="bar-line">
          <div class="bar-fill" id="barFill" style="width:0%"></div>
        </div>
        <div class="bar-pct">${pct}%</div>
      </div>
    `;

    setTimeout(() => {
      const bar = document.getElementById('barFill');
      if (bar) bar.style.width = pct + '%';
    }, 100);

  } catch (e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
