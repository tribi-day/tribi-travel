<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reading stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 16px 20px 32px;
    color: #1a1a1a;
    overflow-x: hidden;
  }
  .wrap { width: 100%; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.5px; display:flex; align-items:center; gap:8px; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .row:last-of-type { border-bottom: none; }

  /* 책 그리드 */
  .bar-section { margin-top: 20px; width: 100%; }
  .books-row {
    display: grid;
    grid-template-rows: 1fr 1fr;
    width: 100%;
    height: 60px;
    gap: 2px;
  }
  .book-slot {
    height: 100%;
    border-radius: 2px;
    overflow: hidden;
    cursor: default;
    position: relative;
  }
  .book-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .book-slot.real { cursor: pointer; }
  .book-slot.ghost { background: #e4e4e4; }

  /* 팝업 카드 */
  .popup {
    display: none;
    position: fixed;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    padding: 20px;
    z-index: 9999;
    width: 200px;
    pointer-events: none;
  }
  .popup.show { display: block; }
  .popup-cover {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 6px;
    display: block;
    margin-bottom: 12px;
  }
  .popup-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.4; }
  .popup-author { font-size: 11px; color: #777; margin-bottom: 2px; }
  .popup-publisher { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .popup-bottom { display: flex; justify-content: space-between; align-items: center; }
  .popup-stars { font-size: 13px; color: #f4b942; }
  .popup-date { font-size: 11px; color: #aaa; }

  .bar-pct { text-align: right; font-size: 12px; color: #aaa; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div style="color:#aaa;font-size:14px;padding:40px 0;">불러오는 중...</div>
</div>
<div class="popup" id="popup">
  <img class="popup-cover" id="popCover" src="" alt="">
  <div class="popup-title" id="popTitle"></div>
  <div class="popup-author" id="popAuthor"></div>
  <div class="popup-publisher" id="popPublisher"></div>
  <div class="popup-bottom">
    <div class="popup-stars" id="popStars"></div>
    <div class="popup-date" id="popDate"></div>
  </div>
</div>

<script>
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}
function formatStars(r) {
  if (!r) return '';
  const n = parseInt(r);
  if (isNaN(n)) return r;
  return '★'.repeat(n) + '☆'.repeat(Math.max(0, 5-n));
}

let popupVisible = false;
function showPopup(e, book) {
  const p = document.getElementById('popup');
  document.getElementById('popCover').src = book.url;
  document.getElementById('popTitle').textContent = book.title || '';
  document.getElementById('popAuthor').textContent = book.author || '';
  document.getElementById('popPublisher').textContent = book.publisher || '';
  document.getElementById('popStars').textContent = formatStars(book.rating);
  document.getElementById('popDate').textContent = formatDate(book.date);

  p.classList.add('show');
  positionPopup(e);
  popupVisible = true;
}
function positionPopup(e) {
  const p = document.getElementById('popup');
  let x = e.clientX + 16;
  let y = e.clientY - 320;
  if (x + 210 > window.innerWidth) x = e.clientX - 220;
  if (y < 8) y = 8;
  if (y + 320 > window.innerHeight) y = window.innerHeight - 324;
  p.style.left = x + 'px';
  p.style.top = y + 'px';
}
function hidePopup() {
  document.getElementById('popup').classList.remove('show');
  popupVisible = false;
}
document.addEventListener('click', hidePopup);

(async () => {
  const wrap = document.getElementById('wrap');
  const now = new Date();
  const year = now.getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<p>${d.error}</p>`; return; }

    const total = (d.fictionTotal||0) + (d.nonfictionTotal||0);
    const total5 = (d.fiction5stars||0) + (d.nonfiction5stars||0);
    const pct = d.목표권수 ? Math.min(100, Math.round(total/d.목표권수*100)) : 0;
    const goal = d.목표권수 || 30;

    // 완독일 오래된 순 정렬
    const allCovers = [...(d.fictionCovers||[]), ...(d.nonfictionCovers||[])]
      .sort((a, b) => ((a.date||'9999') < (b.date||'9999') ? -1 : 1));

    const slotCount = Math.max(goal, total);
    const cols = Math.ceil(slotCount / 2);

    const booksHTML = Array.from({length: slotCount}).map((_, i) => {
      const book = allCovers[i];
      if (book) {
        const title = (book.title||'').replace(/"/g,'&quot;');
        return `<div class="book-slot real" data-i="${i}"><img src="${book.url}" alt="${title}"></div>`;
      }
      return `<div class="book-slot ghost"></div>`;
    }).join('');

    wrap.innerHTML = `
      <h1>What did I <img src="/book.png" style="width:28px;height:28px;object-fit:contain;vertical-align:middle;"> read in ${year}?</h1>
      <div class="row"><span>total</span><span>${total} books</span></div>
      <div class="row"><span>goal</span><span>${goal} books</span></div>
      <div class="row"><span>fiction</span><span>${d.fictionTotal||0} books, ${(d.fictionPage||0).toLocaleString()} pages</span></div>
      <div class="row"><span>nonfiction</span><span>${d.nonfictionTotal||0} books, ${(d.nonfictionPage||0).toLocaleString()} pages</span></div>
      <div class="row"><span>5 stars</span><span>${total5} book${total5!==1?'s':''}</span></div>
      <div class="bar-section">
        <div class="books-row" style="grid-template-columns:repeat(${cols},1fr);">${booksHTML}</div>
        <div class="bar-pct">${pct}%</div>
      </div>
    `;

    // 호버 이벤트
    document.querySelectorAll('.book-slot.real').forEach(el => {
      const i = parseInt(el.dataset.i);
      const book = allCovers[i];
      if (!book) return;
      el.addEventListener('mouseenter', (e) => showPopup(e, book));
      el.addEventListener('mousemove', positionPopup);
      el.addEventListener('mouseleave', hidePopup);
    });

  } catch(e) {
    wrap.innerHTML = '<p style="color:#aaa">불러올 수 없어요 :(</p>';
  }
})();
</script>
</body>
</html>
