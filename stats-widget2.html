<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reading stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 24px 20px 32px;
    color: #1a1a1a;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .loading { color: #aaa; font-size: 14px; padding: 40px 0; }

  h1 {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 28px;
    line-height: 1.3;
    letter-spacing: -0.5px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .row:last-of-type { border-bottom: none; }
  .row-label {
    font-size: 15px;
    color: #1a1a1a;
    font-weight: 400;
  }
  .row-value {
    font-size: 15px;
    color: #1a1a1a;
    text-align: right;
  }

  .covers-strip {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .cover-img {
    width: 26px;
    height: 38px;
    object-fit: cover;
    border-radius: 2px;
  }

  .bar-wrap { margin-top: 24px; }
  .bar-track {
    width: 100%;
    height: 10px;
    background: #ebebeb;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .bar-fill {
    height: 100%;
    background: #1a1a1a;
    border-radius: 20px;
    transition: width 1s ease;
  }
  .bar-pct {
    font-size: 13px;
    color: #aaa;
    text-align: right;
  }
  .bar-container {
    position: relative;
    margin-top: 40px;
    padding-top: 30px;
  }
  .covers-overlay {
    position: absolute;
    top: 0;
    left: 0;
    height: 60px;
    overflow: visible;
    display: flex;
    align-items: center;
    pointer-events: none;
  }
  .ghost-sticker {
    width: 28px;
    height: 44px;
    border-radius: 2px;
    background: #e8e8e8;
    position: relative;
    margin-right: -7px;
    flex-shrink: 0;
  }
  .cover-sticker {
    width: 28px;
    height: 44px;
    object-fit: cover;
    border-radius: 2px;
    position: relative;
    margin-right: -7px;
    flex-shrink: 0;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.25);
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
(async () => {
  const wrap = document.getElementById('wrap');
  const now = new Date();
  const year = now.getFullYear();

  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();

    if (d.error) {
      wrap.innerHTML = `<div class="loading">${d.error}</div>`;
      return;
    }

    const total = (d.fictionTotal || 0) + (d.nonfictionTotal || 0);
    const total5 = (d.fiction5stars || 0) + (d.nonfiction5stars || 0);
    const totalPages = (d.fictionPage || 0) + (d.nonfictionPage || 0);
    const pct = d.목표권수 ? Math.min(100, Math.round(total / d.목표권수 * 100)) : 0;
    const allCovers = [...(d.fictionCovers || []), ...(d.nonfictionCovers || [])];



    wrap.innerHTML = `
      <h1>What did I 📖 read in ${year}?</h1>

      <div class="row">
        <span class="row-label">total</span>
        <span class="row-value">${total} books</span>
      </div>
      <div class="row">
        <span class="row-label">goal</span>
        <span class="row-value">${d.목표권수 || '?'} books</span>
      </div>
      <div class="row">
        <span class="row-label">fiction</span>
        <span class="row-value">${d.fictionTotal || 0} books, ${(d.fictionPage || 0).toLocaleString()} pages</span>
      </div>
      <div class="row">
        <span class="row-label">nonfiction</span>
        <span class="row-value">${d.nonfictionTotal || 0} books, ${(d.nonfictionPage || 0).toLocaleString()} pages</span>
      </div>
      <div class="row">
        <span class="row-label">5 stars</span>
        <span class="row-value">${total5} book${total5 !== 1 ? 's' : ''}</span>
      </div>


      <div class="bar-container">
        <div class="covers-overlay" id="ghostOverlay" style="width:100%; z-index:0;">
          ${Array.from({length: 20}).map((_, i) => {
            const rotations = [-8,-3,5,-6,4,-9,7,-4,6,-7,-5,3,-7,5,-3,8,-4,6,-8,4];
            const translateY = [0,-3,2,-5,1,-2,3,-4,0,-3,2,-1,4,-2,1,-3,2,-4,1,-2];
            const rot = rotations[i % rotations.length];
            const ty = translateY[i % translateY.length];
            return `<div class="ghost-sticker" style="transform: rotate(${rot}deg) translateY(${ty}px);"></div>`;
          }).join('')}
        </div>
        ${allCovers.length > 0 ? `
        <div class="covers-overlay" id="coversOverlay" style="width:0%; z-index:1;">
          ${allCovers.slice(0, 10).map((url, i) => {
            const rotations = [-8,-3,5,-6,4,-9,7,-4,6,-7];
            const translateY = [0,-3,2,-5,1,-2,3,-4,0,-3];
            const rot = rotations[i % rotations.length];
            const ty = translateY[i % translateY.length];
            return `<img class="cover-sticker" src="${url}" alt="" style="transform: rotate(${rot}deg) translateY(${ty}px); z-index:${i};">`;
          }).join('')}
        </div>` : ''}
        <div class="bar-track">
          <div class="bar-fill" id="barFill" style="width:0%"></div>
        </div>
        <div class="bar-pct">${pct}%</div>
      </div>
    `;

    setTimeout(() => {
      const bar = document.getElementById('barFill');
      if (bar) bar.style.width = pct + '%';
      const overlay = document.getElementById('coversOverlay');
      if (overlay) {
        overlay.style.transition = 'width 1s ease';
        overlay.style.width = pct + '%';

      }
    }, 100);

  } catch (e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
