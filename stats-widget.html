<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reading stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 20px 16px;
    color: #1a1a1a;
  }
  .wrap { max-width: 360px; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 24px 0; }

  /* 헤더 */
  .year-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 0;
  }

  /* 목표 달성 바 */
  .goal-section { margin-bottom: 16px; }
  .goal-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .goal-label { font-size: 12px; color: #aaa; }
  .goal-count { font-size: 22px; font-weight: 700; }
  .goal-count span { font-size: 13px; font-weight: 400; color: #aaa; }
  .big-bar {
    width: 100%;
    height: 10px;
    background: #f0ebe0;
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .big-bar-fill {
    height: 100%;
    background: #1a1a1a;
    border-radius: 5px;
    transition: width 1s ease;
  }
  .goal-pct { font-size: 12px; color: #aaa; text-align: right; }

  /* 베스트 달 */
  .best-month {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border: 1px solid #f0f0f0;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .best-month-label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
  .best-month-val { font-size: 16px; font-weight: 700; }
  .best-month-count { font-size: 22px; font-weight: 800; }
  .best-month-count span { font-size: 12px; font-weight: 400; color: #aaa; }

  /* 픽션/논픽션 카드 */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 0;
  }
  .card {
    background: #f8f6f2;
    border-radius: 12px;
    padding: 14px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .card-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }
  .card-num span {
    font-size: 13px;
    font-weight: 600;
    vertical-align: 3px;
    margin-left: 2px;
  }
  .card-pages { font-size: 12px; color: #777; margin-bottom: 6px; }
  .card-stars { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  .star-gold { color: #f4b942; }

  /* 책 표지 스트립 */
  .covers {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 10px;
  }
  .cover-thumb {
    width: 18px;
    height: 26px;
    object-fit: cover;
    border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
const year = new Date().getFullYear().toString();

(async () => {
  try {
    const r = await fetch(`/api/reading-stats?year=${year}`);
    const d = await r.json();
    if (d.error) {
      document.getElementById('wrap').innerHTML = `<div class="loading">${d.error}</div>`;
      return;
    }

    const total = (d.fictionTotal || 0) + (d.nonfictionTotal || 0);
    const pct = d.목표권수 ? Math.min(100, Math.round(total / d.목표권수 * 100)) : 0;

    const stars = (count) => `<span class="star-gold">★★★★★</span> ${count || 0}권`;

    const coverStrip = (covers) => {
      if (!covers || covers.length === 0) return '';
      return `<div class="covers">${covers.map(url =>
        `<img class="cover-thumb" src="${url}" alt="">`
      ).join('')}</div>`;
    };

    document.getElementById('wrap').innerHTML = `
      <div style="display:flex; align-items:baseline; gap:6px; margin-bottom:12px;">
        <div class="year-title" style="margin-bottom:0;">${d.year}</div>
        <div style="font-size:22px; font-weight:400; color:#aaa; letter-spacing:-0.5px; position:relative; top:-1px;">독서 현황</div>
      </div>

      <div class="goal-section">
        <div class="goal-row">
          <div class="goal-label">목표 달성도</div>
          <div class="goal-count">${total}<span> / ${d.목표권수 || '?'}권</span></div>
        </div>
        <div class="big-bar">
          <div class="big-bar-fill" id="bigBar" style="width:0%"></div>
        </div>
        <div class="goal-pct">${pct}%</div>
      </div>

      ${d.bestMonth ? `
      <div class="best-month">
        <div>
          <div class="best-month-label">가장 많이 읽은 달</div>
          <div class="best-month-val">${d.bestMonth}</div>
        </div>
        <div class="best-month-count">${d.bestMonthCount}<span>권</span></div>
      </div>` : ''}

      <div class="cards">
        <div class="card">
          <div class="card-label">Fiction</div>
          <div class="card-num">${d.fictionTotal || 0}<span>권</span></div>
          <div class="card-pages">총 ${(d.fictionPage || 0).toLocaleString()}p 읽었어요.</div>
          <div class="card-stars">${stars(d.fiction5stars)}</div>
          ${coverStrip(d.fictionCovers)}
        </div>
        <div class="card">
          <div class="card-label">Nonfiction</div>
          <div class="card-num">${d.nonfictionTotal || 0}<span>권</span></div>
          <div class="card-pages">총 ${(d.nonfictionPage || 0).toLocaleString()}p 읽었어요.</div>
          <div class="card-stars">${stars(d.nonfiction5stars)}</div>
          ${coverStrip(d.nonfictionCovers)}
        </div>
      </div>
    `;

    setTimeout(() => {
      const bar = document.getElementById('bigBar');
      if (bar) bar.style.width = pct + '%';
    }, 100);

  } catch (e) {
    document.getElementById('wrap').innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
