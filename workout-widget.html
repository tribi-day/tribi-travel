<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>workout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 20px 16px 80px;
  }
  .wrap { max-width: 360px; margin: 0 auto; }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .nav-btn {
    background: none; border: none;
    font-size: 22px; color: #bbb; cursor: pointer;
    padding: 4px 8px;
  }
  .nav-btn:hover { color: #1a1a1a; }
  .month-label { font-size: 22px; font-weight: 800; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 8px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: #bbb;
    padding: 4px 0 6px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5px 3px 4px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }
  .cal-day.empty { cursor: default; pointer-events: none; }
  .cal-day.today .day-num {
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12.97px;
    margin-top: -2px;
  }
  .cal-day.has-workout:active { opacity: 0.8; }
  .cal-day:not(.empty):not(.has-workout):active { background: #f0ebe0; }
  .day-num {
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 3px;
  }
  .day-type {
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    word-break: keep-all;
  }

  /* 툴팁 */
  .tooltip {
    display: none;
    position: fixed;
    background: #1a1a1a;
    color: #fff;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    z-index: 500;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .tooltip.show { display: block; }
  .tooltip-type { font-weight: 700; margin-bottom: 3px; }
  .tooltip-duration { color: #aaa; font-size: 12px; }

  /* 통계 */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .stat-card {
    flex: 1;
    background: #f8f6f2;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 10px; color: #aaa; margin-top: 2px; }

  /* 추가 버튼 */
  .add-btn {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fff;
    font-size: 26px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .modal-input, .modal-select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    background: #fff;
  }
  .modal-submit {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .modal-submit:disabled { opacity: 0.5; }
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="cal-grid" id="calGrid"><div class="loading">불러오는 중...</div></div>
  <div class="stats-row" id="statsRow"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-type" id="tooltipType"></div>
  <div class="tooltip-duration" id="tooltipDuration"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <!-- 단계별로 채워짐 -->
  </div>
</div>

<script>
const NOTION_COLORS = {
  default: { bg: '#f1f1ef', text: '#787774' },
  gray:    { bg: '#e3e2e0', text: '#787774' },
  brown:   { bg: '#f1ede9', text: '#8b7d72' },
  orange:  { bg: '#fdecc8', text: '#9b6700' },
  yellow:  { bg: '#fef3b0', text: '#8b7000' },
  green:   { bg: '#dbeddb', text: '#1e6f45' },
  blue:    { bg: '#d3e5ef', text: '#0f5f8a' },
  purple:  { bg: '#e8deee', text: '#6940a5' },
  pink:    { bg: '#f5e0e9', text: '#a5224e' },
  red:     { bg: '#ffe2dd', text: '#ba3a2d' },
};
let year = new Date().getFullYear();
let month = new Date().getMonth() + 1;
let records = [];
const today = new Date().toISOString().split('T')[0];
const DAYS = ['월','화','수','목','금','토','일'];

document.getElementById('prevBtn').addEventListener('click', () => {
  month--; if (month < 1) { month = 12; year--; } load();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  month++; if (month > 12) { month = 1; year++; } load();
});

// 툴팁 닫기
document.addEventListener('click', (e) => {
  if (!e.target.closest('.cal-day')) hideTooltip();
});

async function load() {
  document.getElementById('monthLabel').textContent =
    `${year}.${String(month).padStart(2,'0')}`;
  try {
    const r = await fetch(`/api/workout?year=${year}&month=${month}`);
    records = await r.json();
  } catch { records = []; }
  renderCalendar();
  renderStats();
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDay = (new Date(year, month - 1, 1).getDay() + 6) % 7; // 월요일 시작
  const daysInMonth = new Date(year, month, 0).getDate();

  // 날짜별 기록 맵
  const dateMap = {};
  records.forEach(r => {
    if (!dateMap[r.date]) dateMap[r.date] = [];
    dateMap[r.date].push(r);
  });

  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += `<div class="cal-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const recs = dateMap[dateStr] || [];
    const hasWorkout = recs.length > 0;
    const isToday = dateStr === today;

    const dayEl = document.createElement('div');
    dayEl.className = `cal-day ${hasWorkout ? 'has-workout' : ''} ${isToday ? 'today' : ''}`;
    let typeHTML = '';
    if (hasWorkout) {
      const first = recs[0];
      const c = NOTION_COLORS[first.typeColor] || NOTION_COLORS.default;
      dayEl.style.background = c.bg;
      const extra = recs.length > 1 ? ` +${recs.length - 1}` : '';
      typeHTML = `<div class="day-type" style="color:${c.text};border-radius:4px;padding:1px 3px;">${(first.type || '운동')}${extra}</div>`;
    }
    dayEl.innerHTML = `<div class="day-num">${d}</div>${typeHTML}`;

    if (hasWorkout) {
      dayEl.addEventListener('click', (e) => showTooltip(e, recs));
    }

    grid.appendChild(dayEl);
  }
}

function showTooltip(e, recs) {
  const tooltip = document.getElementById('tooltip');
  const typeEl = document.getElementById('tooltipType');
  const durEl = document.getElementById('tooltipDuration');

  typeEl.textContent = recs.map(r => r.type || '운동').join(', ');
  durEl.textContent = recs.map(r => r.duration ? `${r.duration}분` : '').filter(Boolean).join(' · ');

  const rect = e.currentTarget.getBoundingClientRect();
  tooltip.classList.add('show');

  // 위치 조정
  let left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2;
  let top = rect.top - tooltip.offsetHeight - 8;
  if (left < 8) left = 8;
  if (left + tooltip.offsetWidth > window.innerWidth - 8)
    left = window.innerWidth - tooltip.offsetWidth - 8;
  if (top < 8) top = rect.bottom + 8;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

function renderStats() {
  const total = records.length;
  const totalMin = records.reduce((s, r) => s + (r.duration || 0), 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${total}</div>
      <div class="stat-label">이번 달 운동 횟수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${totalMin}</div>
      <div class="stat-label">총 운동 시간 (분)</div>
    </div>
  `;
}

// 운동 프리셋
const PRESETS = {
  '하체': [
    { name: '맨몸 스쿼트', reps: 20, sets: 2, weight: null },
    { name: '스쿼트', reps: 10, sets: 3, weight: 10 },
    { name: '맨몸 런지', reps: 20, sets: 2, weight: null },
    { name: '런지', reps: 10, sets: 3, weight: 10 },
    { name: '아웃타이', reps: 20, sets: 3, weight: 40 },
    { name: '이너타이', reps: 20, sets: 3, weight: 15 },
    { name: '레그프레스', reps: 10, sets: 4, weight: 40 },
    { name: '레그컬', reps: 20, sets: 4, weight: 15 },
    { name: '데드리프트', reps: 20, sets: 3, weight: 20 },
  ],
  '상체': [
    { name: '시티드로우', reps: 20, sets: 3, weight: 15 },
    { name: '바벨로우', reps: 20, sets: 3, weight: 15 },
    { name: '렛풀다운', reps: 20, sets: 3, weight: 15 },
    { name: '덤벨킥백', reps: 20, sets: 3, weight: 2 },
    { name: '인클라인 푸시업', reps: 20, sets: 3, weight: null },
    { name: '사레레', reps: 20, sets: 3, weight: 2 },
    { name: '시티드 플라이', reps: 20, sets: 3, weight: 15 },
    { name: '덤벨 숄더 프레스', reps: 20, sets: 3, weight: 4 },
    { name: '덤벨 익스텐션', reps: 20, sets: 3, weight: 5 },
    { name: '어시스트 풀업', reps: 20, sets: 3, weight: 40 },
  ],
  '무분할': [],
  '유산소': [
    { name: '복근 운동 영상', duration: 5, unit: '분' },
    { name: '스탭밀', duration: 20, unit: '분', note: '속도 4-6' },
    { name: '마이마운틴', duration: 20, unit: '분', note: '각도 7, 속도 7' },
    { name: '폼롤러 스트레칭', duration: 5, unit: '분' },
    { name: '집-시내 걸어가기', duration: 25, unit: '분' },
  ],
};
// 무분할 = 상체 + 하체 합치기
PRESETS['무분할'] = [...PRESETS['상체'], ...PRESETS['하체']];

const WORKOUT_TYPES = ['하체', '상체', '무분할', '유산소', 'PT 수업', '댄스', '등산', '크로스핏', '프다', '수영', '스쿠버', '클라이밍'];

let selectedExercises = []; // { preset, reps, sets, weight, note }
let currentType = '';
let workoutDate = today;

function openModal() {
  currentType = '';
  selectedExercises = [];
  workoutDate = today;
  renderStep1();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function renderStep1() {
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-title">운동 기록 추가</div>
    <div class="modal-label">날짜</div>
    <input id="workoutDateInput" class="modal-input" type="date" value="${today}">
    <div class="modal-label" style="margin-top:4px;">운동 종류</div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;">
      ${WORKOUT_TYPES.map(t => `
        <button onclick="selectType('${t}')" style="
          padding:8px 14px; border-radius:20px; border:1.5px solid #e0e0e0;
          background:#fff; font-size:13px; cursor:pointer; color:#1a1a1a;
        ">${t}</button>
      `).join('')}
    </div>
  `;
}

function selectType(type) {
  currentType = type;
  workoutDate = document.getElementById('workoutDateInput').value || today;
  const hasPreset = PRESETS[type] && PRESETS[type].length > 0;
  if (hasPreset) {
    renderStep2(type);
  } else {
    renderStepSimple(type);
  }
}

function renderStep2(type) {
  const presets = PRESETS[type];
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <button onclick="renderStep1()" style="background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;">&lt;</button>
      <div class="modal-title" style="margin:0;">${type}</div>
    </div>
    <div id="presetList" style="max-height:50vh; overflow-y:auto; margin-bottom:16px;">
      ${presets.map((p, i) => renderPresetItem(p, i)).join('')}
    </div>
    <div class="modal-label">운동 시간 (분)</div>
    <input id="durationInput" class="modal-input" type="number" placeholder="60" style="margin-bottom:16px;">
    <button class="modal-submit" onclick="submitWorkout()">저장</button>
  `;
}

function renderPresetItem(p, i) {
  const isCardio = p.unit === '분';
  if (isCardio) {
    return `
      <div style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f5f5f5;">
        <input type="checkbox" id="ex-${i}" onchange="toggleExercise(${i})"
          style="width:18px; height:18px; cursor:pointer; flex-shrink:0;">
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:600;">${p.name}</div>
          <div style="font-size:12px; color:#aaa;">${p.duration}분${p.note ? ' · ' + p.note : ''}</div>
        </div>
        <input type="number" id="dur-${i}" value="${p.duration}" min="1"
          style="width:52px; padding:4px 6px; border:1px solid #e0e0e0; border-radius:6px; font-size:13px; text-align:center;">
        <span style="font-size:12px; color:#aaa;">분</span>
      </div>`;
  }
  const weightPart = p.weight !== null
    ? `<input type="number" id="w-${i}" value="${p.weight}" min="0" step="0.5"
        style="width:52px; padding:4px 6px; border:1px solid #e0e0e0; border-radius:6px; font-size:13px; text-align:center;">
       <span style="font-size:12px; color:#aaa;">kg</span>` : '';
  return `
    <div style="display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid #f5f5f5; flex-wrap:wrap;">
      <input type="checkbox" id="ex-${i}" onchange="toggleExercise(${i})"
        style="width:18px; height:18px; cursor:pointer; flex-shrink:0;">
      <div style="font-size:14px; font-weight:600; flex:1; min-width:80px;">${p.name}</div>
      <div style="display:flex; align-items:center; gap:6px;">
        ${weightPart}
        <input type="number" id="r-${i}" value="${p.reps}" min="1"
          style="width:44px; padding:4px 6px; border:1px solid #e0e0e0; border-radius:6px; font-size:13px; text-align:center;">
        <span style="font-size:12px; color:#aaa;">회</span>
        <input type="number" id="s-${i}" value="${p.sets}" min="1"
          style="width:44px; padding:4px 6px; border:1px solid #e0e0e0; border-radius:6px; font-size:13px; text-align:center;">
        <span style="font-size:12px; color:#aaa;">세트</span>
      </div>
    </div>`;
}

function toggleExercise(i) {
  // 체크박스 상태만 추적 (submitWorkout에서 읽음)
}

function renderStepSimple(type) {
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <button onclick="renderStep1()" style="background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;">&lt;</button>
      <div class="modal-title" style="margin:0;">${type}</div>
    </div>
    <div class="modal-label">운동 시간 (분)</div>
    <input id="durationInput" class="modal-input" type="number" placeholder="60" style="margin-bottom:16px;">
    <button class="modal-submit" onclick="submitWorkout()">저장</button>
  `;
}

async function submitWorkout() {
  const duration = parseInt(document.getElementById('durationInput')?.value) || null;
  const presets = PRESETS[currentType] || [];

  // 체크된 운동들로 디테일 생성
  let detailLines = [];
  presets.forEach((p, i) => {
    const cb = document.getElementById(`ex-${i}`);
    if (!cb || !cb.checked) return;
    if (p.unit === '분') {
      const dur = document.getElementById(`dur-${i}`)?.value || p.duration;
      detailLines.push(`- ${p.name} ${dur}분${p.note ? ' (' + p.note + ')' : ''}`);
    } else {
      const w = p.weight !== null ? (document.getElementById(`w-${i}`)?.value || p.weight) + 'kg ' : '';
      const r = document.getElementById(`r-${i}`)?.value || p.reps;
      const s = document.getElementById(`s-${i}`)?.value || p.sets;
      detailLines.push(`- ${p.name} ${w}${r}회 ${s}세트`);
    }
  });
  const detail = detailLines.join('\n');

  const btn = document.querySelector('.modal-submit');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const r = await fetch('/api/workout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date: workoutDate,
        type: currentType,
        duration,
        detail: detail || null,
      }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('modalOverlay').classList.remove('open');
      load();
    }
  } catch {}

  if (btn) { btn.disabled = false; btn.textContent = '저장'; }
}

load();
</script>
</body>
</html>
