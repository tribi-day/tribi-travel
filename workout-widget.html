<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>workout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 20px 16px 80px;
  }
  .wrap { max-width: 360px; margin: 0 auto; }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .nav-btn {
    background: none; border: none;
    font-size: 22px; color: #bbb; cursor: pointer;
    padding: 4px 8px;
  }
  .nav-btn:hover { color: #1a1a1a; }
  .month-label { font-size: 22px; font-weight: 800; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    background: #f2f2f2;
    border-radius: 12px;
    padding: 8px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: #bbb;
    padding: 4px 0 6px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5px 3px 4px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }
  .cal-day.empty { cursor: default; pointer-events: none; }
  .cal-day.today .day-num {
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-day.has-workout { background: #e8f4e8; }
  .cal-day.has-workout:active { background: #d0e8d0; }
  .cal-day:not(.empty):not(.has-workout):active { background: #f0ebe0; }
  .day-num {
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 3px;
  }
  .day-type {
    font-size: 10px;
    color: #3a8a3a;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    word-break: keep-all;
  }

  /* 툴팁 */
  .tooltip {
    display: none;
    position: fixed;
    background: #1a1a1a;
    color: #fff;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    z-index: 500;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .tooltip.show { display: block; }
  .tooltip-type { font-weight: 700; margin-bottom: 3px; }
  .tooltip-duration { color: #aaa; font-size: 12px; }

  /* 통계 */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .stat-card {
    flex: 1;
    background: #f8f6f2;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 10px; color: #aaa; margin-top: 2px; }

  /* 추가 버튼 */
  .add-btn {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fff;
    font-size: 26px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .modal-input, .modal-select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    background: #fff;
  }
  .modal-submit {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .modal-submit:disabled { opacity: 0.5; }
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="cal-grid" id="calGrid"><div class="loading">불러오는 중...</div></div>
  <div class="stats-row" id="statsRow"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-type" id="tooltipType"></div>
  <div class="tooltip-duration" id="tooltipDuration"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">운동 기록 추가</div>
    <div class="modal-label">날짜</div>
    <input id="workoutDate" class="modal-input" type="date">
    <div class="modal-label">운동 종류</div>
    <input id="workoutType" class="modal-input" type="text" placeholder="예: 헬스 상체, 러닝">
    <div class="modal-label">운동 시간 (분)</div>
    <input id="workoutDuration" class="modal-input" type="number" placeholder="60">
    <button class="modal-submit" id="submitBtn" onclick="addWorkout()">추가</button>
  </div>
</div>

<script>
let year = new Date().getFullYear();
let month = new Date().getMonth() + 1;
let records = [];
const today = new Date().toISOString().split('T')[0];
const DAYS = ['일','월','화','수','목','금','토'];

document.getElementById('prevBtn').addEventListener('click', () => {
  month--; if (month < 1) { month = 12; year--; } load();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  month++; if (month > 12) { month = 1; year++; } load();
});

// 툴팁 닫기
document.addEventListener('click', (e) => {
  if (!e.target.closest('.cal-day')) hideTooltip();
});

async function load() {
  document.getElementById('monthLabel').textContent =
    `${year}.${String(month).padStart(2,'0')}`;
  try {
    const r = await fetch(`/api/workout?year=${year}&month=${month}`);
    records = await r.json();
  } catch { records = []; }
  renderCalendar();
  renderStats();
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  // 날짜별 기록 맵
  const dateMap = {};
  records.forEach(r => {
    if (!dateMap[r.date]) dateMap[r.date] = [];
    dateMap[r.date].push(r);
  });

  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += `<div class="cal-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const recs = dateMap[dateStr] || [];
    const hasWorkout = recs.length > 0;
    const isToday = dateStr === today;

    const typeHTML = hasWorkout
      ? recs.map(r => `<div class="day-type">${r.type || '운동'}</div>`).join('')
      : '';

    const dayEl = document.createElement('div');
    dayEl.className = `cal-day ${hasWorkout ? 'has-workout' : ''} ${isToday ? 'today' : ''}`;
    dayEl.innerHTML = `<div class="day-num">${d}</div>${typeHTML}`;

    if (hasWorkout) {
      dayEl.addEventListener('click', (e) => showTooltip(e, recs));
    }

    grid.appendChild(dayEl);
  }
}

function showTooltip(e, recs) {
  const tooltip = document.getElementById('tooltip');
  const typeEl = document.getElementById('tooltipType');
  const durEl = document.getElementById('tooltipDuration');

  typeEl.textContent = recs.map(r => r.type || '운동').join(', ');
  durEl.textContent = recs.map(r => r.duration ? `${r.duration}분` : '').filter(Boolean).join(' · ');

  const rect = e.currentTarget.getBoundingClientRect();
  tooltip.classList.add('show');

  // 위치 조정
  let left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2;
  let top = rect.top - tooltip.offsetHeight - 8;
  if (left < 8) left = 8;
  if (left + tooltip.offsetWidth > window.innerWidth - 8)
    left = window.innerWidth - tooltip.offsetWidth - 8;
  if (top < 8) top = rect.bottom + 8;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

function renderStats() {
  const total = records.length;
  const totalMin = records.reduce((s, r) => s + (r.duration || 0), 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${total}</div>
      <div class="stat-label">이번 달 운동 횟수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${totalMin}</div>
      <div class="stat-label">총 운동 시간 (분)</div>
    </div>
  `;
}

function openModal() {
  document.getElementById('workoutDate').value = today;
  document.getElementById('workoutType').value = '';
  document.getElementById('workoutDuration').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

async function addWorkout() {
  const date = document.getElementById('workoutDate').value;
  const type = document.getElementById('workoutType').value.trim();
  const duration = parseInt(document.getElementById('workoutDuration').value);
  if (!date) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '추가 중...';

  try {
    const r = await fetch('/api/workout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, type, duration: duration || null }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('modalOverlay').classList.remove('open');
      load();
    }
  } catch {}

  btn.disabled = false; btn.textContent = '추가';
}

load();
</script>
</body>
</html>
