<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>workout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f6f2;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }
  .wrap { max-width: 360px; margin: 0 auto; }

  /* 월 네비게이션 */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .nav-btn {
    background: none; border: none;
    font-size: 22px; color: #bbb; cursor: pointer;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  .nav-btn:hover { color: #1a1a1a; }
  .month-label { font-size: 22px; font-weight: 800; }

  /* 캘린더 */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 24px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: #bbb;
    padding: 4px 0;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }
  .cal-day.empty { cursor: default; }
  .cal-day.today .day-num {
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-day.has-workout { background: #e8f4e8; }
  .cal-day.has-workout:hover { background: #d4ecd4; }
  .cal-day:not(.empty):not(.has-workout):hover { background: #f0ebe0; }
  .day-num { font-size: 12px; font-weight: 500; line-height: 1; }
  .day-dot {
    font-size: 8px;
    margin-top: 2px;
    color: #4a9a4a;
    line-height: 1;
  }

  /* 운동 기록 리스트 */
  .records-title {
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .record-item {
    background: #fff;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .record-date { font-size: 12px; color: #aaa; margin-bottom: 2px; }
  .record-type { font-size: 15px; font-weight: 600; }
  .record-duration {
    font-size: 14px;
    font-weight: 700;
    color: #4a9a4a;
  }
  .record-duration span { font-size: 11px; font-weight: 400; color: #aaa; }
  .no-record { text-align: center; padding: 20px; color: #bbb; font-size: 13px; }

  /* 추가 버튼 */
  .add-btn {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fff;
    font-size: 26px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 추가 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .modal-input, .modal-select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    background: #fff;
    appearance: none;
  }
  .modal-row { display: flex; gap: 10px; }
  .modal-row .modal-input { flex: 1; }
  .modal-submit {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .modal-submit:disabled { opacity: 0.5; }

  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    flex: 1;
    background: #fff;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 10px; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="records-title">이번 달 운동 기록</div>
  <div id="recordList"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">운동 기록 추가</div>
    <div class="modal-label">날짜</div>
    <input id="workoutDate" class="modal-input" type="date">
    <div class="modal-label">운동 종류</div>
    <input id="workoutType" class="modal-input" type="text" placeholder="예: 헬스, 러닝, 수영">
    <div class="modal-label">운동 시간 (분)</div>
    <input id="workoutDuration" class="modal-input" type="number" placeholder="60">
    <button class="modal-submit" id="submitBtn" onclick="addWorkout()">추가</button>
  </div>
</div>

<script>
let year = new Date().getFullYear();
let month = new Date().getMonth() + 1;
let records = [];

const DAYS = ['일','월','화','수','목','금','토'];
const today = new Date().toISOString().split('T')[0];

document.getElementById('prevBtn').addEventListener('click', () => {
  month--;
  if (month < 1) { month = 12; year--; }
  load();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  month++;
  if (month > 12) { month = 1; year++; }
  load();
});

async function load() {
  document.getElementById('monthLabel').textContent = `${year}.${String(month).padStart(2,'0')}`;
  try {
    const r = await fetch(`/api/workout?year=${year}&month=${month}`);
    records = await r.json();
    renderCalendar();
    renderStats();
    renderList();
  } catch {
    records = [];
    renderCalendar();
    renderStats();
    renderList();
  }
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  // 날짜별 운동 기록 맵
  const dateMap = {};
  records.forEach(r => {
    if (!dateMap[r.date]) dateMap[r.date] = [];
    dateMap[r.date].push(r);
  });

  // 빈 칸
  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += `<div class="cal-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasWorkout = !!dateMap[dateStr];
    const isToday = dateStr === today;
    const types = hasWorkout ? dateMap[dateStr].map(r => r.type).filter(Boolean) : [];

    grid.innerHTML += `
      <div class="cal-day ${hasWorkout ? 'has-workout' : ''} ${isToday ? 'today' : ''}"
           onclick="scrollToDate('${dateStr}')">
        <div class="day-num">${d}</div>
        ${hasWorkout ? `<div class="day-dot">${types[0] ? '●' : '●'}</div>` : ''}
      </div>
    `;
  }
}

function renderStats() {
  const total = records.length;
  const totalMin = records.reduce((s, r) => s + (r.duration || 0), 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${total}</div>
      <div class="stat-label">이번 달 운동 횟수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${totalMin}</div>
      <div class="stat-label">총 운동 시간 (분)</div>
    </div>
  `;
}

function renderList() {
  const list = document.getElementById('recordList');
  if (records.length === 0) {
    list.innerHTML = '<div class="no-record">이번 달 운동 기록이 없어요 💪</div>';
    return;
  }
  list.innerHTML = records.map(r => `
    <div class="record-item" id="rec-${r.pageId}">
      <div>
        <div class="record-date">${r.date}</div>
        <div class="record-type">${r.type || '운동'}</div>
      </div>
      ${r.duration ? `<div class="record-duration">${r.duration}<span>분</span></div>` : ''}
    </div>
  `).join('');
}

function scrollToDate(dateStr) {
  const el = document.getElementById(`rec-${records.find(r => r.date === dateStr)?.pageId}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function openModal() {
  document.getElementById('workoutDate').value = today;
  document.getElementById('workoutType').value = '';
  document.getElementById('workoutDuration').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('workoutType').focus();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

async function addWorkout() {
  const date = document.getElementById('workoutDate').value;
  const type = document.getElementById('workoutType').value.trim();
  const duration = parseInt(document.getElementById('workoutDuration').value);
  if (!date) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '추가 중...';

  try {
    const r = await fetch('/api/workout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, type, duration: duration || null }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('modalOverlay').classList.remove('open');
      load();
    }
  } catch {}

  btn.disabled = false;
  btn.textContent = '추가';
}

load();
</script>
</body>
</html>
