<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="todo">
<link rel="apple-touch-icon" href="/todo-icon-192.png">
<title>할일</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f6f2;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .header {
    position: sticky;
    top: 0;
    background: #f8f6f2;
    padding: 20px 16px 12px;
    border-bottom: 1px solid #ece8e0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 22px; font-weight: 800; }
  .header-count { font-size: 13px; color: #aaa; }
  .refresh-btn {
    background: none; border: none;
    font-size: 18px; cursor: pointer; color: #aaa;
  }
  .list { padding: 12px 16px 40px; }
  .category-group { margin-bottom: 20px; }
  .category-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .todo-item.completing { opacity: 0.4; }
  .todo-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #e0e0e0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .todo-check.done {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
    font-size: 12px;
  }
  .todo-text { font-size: 15px; line-height: 1.4; flex: 1; }
  .todo-status {
    font-size: 11px;
    color: #aaa;
    background: #f8f6f2;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  .add-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fff;
    font-size: 26px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 100;
  }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
  }
  .modal-select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 16px;
    background: #fff;
    appearance: none;
  }
  .modal-submit {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-submit:disabled { opacity: 0.5; }
  .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
  .edit-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    align-items: flex-end;
  }
  .edit-modal-overlay.open { display: flex; }
  .edit-modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .edit-modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .edit-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
  }
  .edit-select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    background: #fff;
    appearance: none;
  }
  .edit-btn-row { display: flex; gap: 8px; margin-top: 4px; }
  .edit-save-btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .edit-delete-btn {
    padding: 13px 18px;
    border-radius: 10px;
    border: none;
    background: #fff0f0;
    color: #cc3333;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="header">
  <div>
  
    <div class="header-count" id="count"></div>
  </div>
  <button class="refresh-btn" onclick="loadTodos()">↻</button>
</div>
<div class="list" id="list">
  <div class="loading">불러오는 중...</div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">할일 추가</div>
    <input id="newTodoInput" class="modal-input" type="text" placeholder="할일을 입력하세요">
    <select id="newTodoCategory" class="modal-select">
      <option value="">분류 선택</option>
      <option value="tribi studio">tribi studio</option>
      <option value="coding">coding</option>
      <option value="write">write</option>
      <option value="read">read</option>
      <option value="sns">sns</option>
      <option value="etc">etc</option>
    </select>
    <button class="modal-submit" id="submitBtn" onclick="addTodo()">추가</button>
  </div>
</div>

<div class="edit-modal-overlay" id="editModalOverlay" onclick="closeEditModal(event)">
  <div class="edit-modal">
    <div class="edit-modal-title">할일 수정</div>
    <input id="editTodoInput" class="edit-input" type="text" placeholder="할일을 입력하세요">
    <select id="editTodoCategory" class="edit-select">
      <option value="">분류 선택</option>
      <option value="tribi studio">tribi studio</option>
      <option value="coding">coding</option>
      <option value="write">write</option>
      <option value="read">read</option>
      <option value="sns">sns</option>
      <option value="etc">etc</option>
    </select>
    <div class="edit-btn-row">
      <button class="edit-save-btn" id="editSaveBtn" onclick="saveEdit()">저장</button>
      <button class="edit-delete-btn" id="editDeleteBtn" onclick="deleteTodo()">삭제</button>
    </div>
  </div>
</div>

<script>

  const notionColors = {
    default: { bg: '#f1ede9', text: '#8b7d72' },
    gray:    { bg: '#e3e2e0', text: '#787774' },
    brown:   { bg: '#f1ede9', text: '#8b7d72' },
    orange:  { bg: '#fdecc8', text: '#9b6700' },
    yellow:  { bg: '#fef3b0', text: '#8b7000' },
    green:   { bg: '#dbeddb', text: '#1e6f45' },
    blue:    { bg: '#d3e5ef', text: '#0f5f8a' },
    purple:  { bg: '#e8deee', text: '#6940a5' },
    pink:    { bg: '#f5e0e9', text: '#a5224e' },
    red:     { bg: '#ffe2dd', text: '#ba3a2d' },
  };
  function getCategoryStyle(color) {
    const c = notionColors[color] || notionColors.default;
    return `background:${c.bg}; color:${c.text};`;
  }

let todos = [];

let editingTodo = null;

function openEditModal(todo) {
  editingTodo = todo;
  document.getElementById('editTodoInput').value = todo.title;
  document.getElementById('editTodoCategory').value = todo.category || '';
  document.getElementById('editModalOverlay').classList.add('open');
  document.getElementById('editTodoInput').focus();
}

function closeEditModal(e) {
  if (e.target === document.getElementById('editModalOverlay')) {
    document.getElementById('editModalOverlay').classList.remove('open');
    editingTodo = null;
  }
}

async function saveEdit() {
  if (!editingTodo) return;
  const title = document.getElementById('editTodoInput').value.trim();
  const category = document.getElementById('editTodoCategory').value;
  if (!title) return;

  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    const r = await fetch('/api/todos', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: editingTodo.pageId, title, category }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('editModalOverlay').classList.remove('open');
      editingTodo = null;
      loadTodos();
    }
  } catch {}

  btn.disabled = false;
  btn.textContent = '저장';
}

async function deleteTodo() {
  if (!editingTodo) return;
  if (!confirm('정말 삭제할까요?')) return;

  const btn = document.getElementById('editDeleteBtn');
  btn.disabled = true;

  try {
    const r = await fetch('/api/todos', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: editingTodo.pageId }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('editModalOverlay').classList.remove('open');
      editingTodo = null;
      loadTodos();
    }
  } catch {}

  btn.disabled = false;
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('newTodoInput').focus();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

async function addTodo() {
  const title = document.getElementById('newTodoInput').value.trim();
  const category = document.getElementById('newTodoCategory').value;
  if (!title) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '추가 중...';

  try {
    const r = await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, category }),
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('newTodoInput').value = '';
      document.getElementById('newTodoCategory').value = '';
      loadTodos();
    }
  } catch {}

  btn.disabled = false;
  btn.textContent = '추가';
}

async function loadTodos() {
  document.getElementById('list').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const r = await fetch('/api/todos');
    todos = await r.json();
    render();
  } catch {
    document.getElementById('list').innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
}

function render() {
  const list = document.getElementById('list');
  if (todos.length === 0) {
    list.innerHTML = '<div class="empty">할일이 없어요 🎉</div>';
    document.getElementById('count').textContent = '';
    return;
  }

  document.getElementById('count').textContent = `${todos.length}개`;

  // 카테고리별 그룹
  const groups = {};
  todos.forEach(t => {
    const cat = t.category || '기타';
    const catColor = t.categoryColor || 'default';
    if (!groups[cat]) groups[cat] = { items: [], color: catColor };
    groups[cat].items.push(t);
  });

  list.innerHTML = '';
  Object.entries(groups).forEach(([cat, group]) => {
    const { items, color } = group;
    const groupEl = document.createElement('div');
    groupEl.className = 'category-group';
    const catStyle = getCategoryStyle(color);
    groupEl.innerHTML = `<div class="category-label" style="${catStyle}">${cat}</div>`;
    items.forEach(todo => {
      const item = document.createElement('div');
      item.className = 'todo-item';
      item.id = `todo-${todo.pageId}`;
      item.innerHTML = `
        <div class="todo-check ${todo.status === '완료' ? 'done' : ''}">
          ${todo.status === '완료' ? '✓' : ''}
        </div>
        <div class="todo-text">${todo.title}</div>
      `;
      item.addEventListener('click', () => completeTodo(todo));
      item.addEventListener('contextmenu', (e) => { e.preventDefault(); openEditModal(todo); });
      let pressTimer;
      item.addEventListener('touchstart', () => { pressTimer = setTimeout(() => openEditModal(todo), 500); });
      item.addEventListener('touchend', () => clearTimeout(pressTimer));
      item.addEventListener('touchmove', () => clearTimeout(pressTimer));
      groupEl.appendChild(item);
    });
    list.appendChild(groupEl);
  });
}

async function completeTodo(todo) {
  const el = document.getElementById(`todo-${todo.pageId}`);
  if (!el) return;
  el.classList.add('completing');

  try {
    const r = await fetch('/api/todos', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: todo.pageId, status: '완료' }),
    });
    const data = await r.json();
    if (data.success) {
      setTimeout(() => {
        todos = todos.filter(t => t.pageId !== todo.pageId);
        render();
      }, 400);
    } else {
      el.classList.remove('completing');
    }
  } catch {
    el.classList.remove('completing');
  }
}

loadTodos();
</script>
</body>
</html>
