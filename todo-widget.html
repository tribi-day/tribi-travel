<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>할일</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f6f2;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .header {
    position: sticky;
    top: 0;
    background: #f8f6f2;
    padding: 20px 16px 12px;
    border-bottom: 1px solid #ece8e0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 22px; font-weight: 800; }
  .header-count { font-size: 13px; color: #aaa; }
  .refresh-btn {
    background: none; border: none;
    font-size: 18px; cursor: pointer; color: #aaa;
  }
  .list { padding: 12px 16px 40px; }
  .category-group { margin-bottom: 20px; }
  .category-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .todo-item.completing { opacity: 0.4; }
  .todo-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #e0e0e0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .todo-check.done {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
    font-size: 12px;
  }
  .todo-text { font-size: 15px; line-height: 1.4; flex: 1; }
  .todo-status {
    font-size: 11px;
    color: #aaa;
    background: #f8f6f2;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">할일</div>
    <div class="header-count" id="count"></div>
  </div>
  <button class="refresh-btn" onclick="loadTodos()">↻</button>
</div>
<div class="list" id="list">
  <div class="loading">불러오는 중...</div>
</div>

<script>
let todos = [];

async function loadTodos() {
  document.getElementById('list').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const r = await fetch('/api/todos');
    todos = await r.json();
    render();
  } catch {
    document.getElementById('list').innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
}

function render() {
  const list = document.getElementById('list');
  if (todos.length === 0) {
    list.innerHTML = '<div class="empty">할일이 없어요 🎉</div>';
    document.getElementById('count').textContent = '';
    return;
  }

  document.getElementById('count').textContent = `${todos.length}개`;

  // 카테고리별 그룹
  const groups = {};
  todos.forEach(t => {
    const cat = t.category || '기타';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  list.innerHTML = '';
  Object.entries(groups).forEach(([cat, items]) => {
    const group = document.createElement('div');
    group.className = 'category-group';
    group.innerHTML = `<div class="category-label">${cat}</div>`;
    items.forEach(todo => {
      const item = document.createElement('div');
      item.className = 'todo-item';
      item.id = `todo-${todo.pageId}`;
      item.innerHTML = `
        <div class="todo-check ${todo.status === '완료' ? 'done' : ''}">
          ${todo.status === '완료' ? '✓' : ''}
        </div>
        <div class="todo-text">${todo.title}</div>
        ${todo.status && todo.status !== '완료' ? `<div class="todo-status">${todo.status}</div>` : ''}
      `;
      item.addEventListener('click', () => completeTodo(todo));
      group.appendChild(item);
    });
    list.appendChild(group);
  });
}

async function completeTodo(todo) {
  const el = document.getElementById(`todo-${todo.pageId}`);
  if (!el) return;
  el.classList.add('completing');

  try {
    const r = await fetch('/api/todos', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId: todo.pageId, status: '완료' }),
    });
    const data = await r.json();
    if (data.success) {
      setTimeout(() => {
        todos = todos.filter(t => t.pageId !== todo.pageId);
        render();
      }, 400);
    } else {
      el.classList.remove('completing');
    }
  } catch {
    el.classList.remove('completing');
  }
}

loadTodos();
</script>
</body>
</html>
