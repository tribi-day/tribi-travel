<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>today's photo — reef.and.roots</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 12px;
  }
  .widget {
    max-width: 420px;
    margin: 0 auto;
  }
  .photo-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    border-radius: 12px;
    overflow: hidden;
    background: #e8e2d6;
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .info-row {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
    display: flex;
    justify-content: space-between;
  }
  .loading, .error {
    color: #999;
    font-size: 14px;
    padding: 16px 0;
    text-align: center;
  }
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="loading">불러오는 중...</div>
</div>

<script>
// 날짜를 기준으로 항상 같은 숫자가 나오게 만드는 함수
// (하루 동안은 새로고침해도 같은 사진, 다음 날 자정에 바뀜)
function getDailySeed() {
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
  let hash = 0;
  for (let i = 0; i < dateStr.length; i++) {
    hash = (hash << 5) - hash + dateStr.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function optimizeUrl(url) {
  if (!url || !url.includes('cloudinary.com')) return url;
  return url.replace('/upload/', '/upload/q_auto,f_auto,w_800,a_exif,fl_force_strip/');
}

(async () => {
  const widget = document.getElementById('widget');
  try {
    const res = await fetch('/photos.json');
    const data = await res.json();
    const valid = Array.isArray(data) ? data.filter(p => p.file) : [];

    if (valid.length === 0) {
      widget.innerHTML = '<div class="error">사진을 불러올 수 없어요.</div>';
      return;
    }

    const seed = getDailySeed();
    const index = seed % valid.length;
    const photo = valid[index];

    const locationText = [photo.city, photo.country].filter(Boolean).join(', ');

    widget.innerHTML = `
      <div class="photo-frame">
        <img src="${optimizeUrl(photo.file)}" alt="${photo.city || 'travel photo'}">
      </div>
      <div class="info-row">
        <span>${locationText}</span>
        <span>${photo.date || ''}</span>
      </div>
    `;
  } catch (err) {
    widget.innerHTML = '<div class="error">사진을 불러올 수 없어요.</div>';
  }
})();
</script>
</body>
</html>
