<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reef.and.roots</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>

@font-face {
  font-family: 'Tribi';
  src: url('./fonts/Tribi_eng.ttf') format('truetype');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DOSPilgi';
  src: url('./fonts/DOSPilgi.ttf') format('truetype');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DOSGothic';
  src: url('./fonts/DOSGothic.ttf') format('truetype');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Retrograde';
  src: url('./fonts/Retrograde-Regular.otf') format('opentype');
  font-weight: normal;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f0ebe0;
  --ink: #1a1a1a;
  --ink-mid: rgba(26,26,26,0.45);
  --ink-faint: rgba(26,26,26,0.12);
  --caramel: #b8864e;
  --sidebar-w: 90px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: 'DOSPilgi', monospace;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  flex-shrink: 0;
}

.header-globe {
  font-family: 'DOSPilgi', monospace;
  font-size: 30px;
  line-height: 1;
}

.header-title {
  font-family: 'DOSGothic', monospace;
  font-size: 24px;
  letter-spacing: 0.04em;
  color: var(--ink);
}

.header-subtitle {
  font-family: 'DOSGothic', monospace;
  font-size: 14px;
  color: var(--ink-mid);
  letter-spacing: 0.02em;
}


.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  padding: 16px 4px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
}

.sidebar-icons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0px;
  align-content: start;
}

.sidebar-bottom {
  padding-top: 8px;
  display: flex;
  justify-content: center;
}

.about-btn {
  font-family: 'DOSPilgi', monospace;
  font-size: 20px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  opacity: 0.35;
  transition: opacity 0.15s;
  filter: grayscale(1);
}

.about-btn:hover { opacity: 0.65; }
.about-btn.active { filter: none; opacity: 1; }

.icon-btn {
  font-family: 'DOSPilgi', monospace;
  font-size: 22px;
  line-height: 1;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  border-radius: 6px;
  text-align: center;
  width: 100%;
  transition: opacity 0.15s, filter 0.15s;
  filter: grayscale(1);
  opacity: 0.35;
}

.icon-btn:hover { opacity: 0.65; }
.icon-btn.active { filter: grayscale(1) brightness(0); opacity: 1; color: #e03030; }

.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ── 갤러리 ── */
.gallery-view {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-auto-rows: auto;
  gap: 6px;
  align-content: start;
}

.gallery-view.hidden { display: none; }

/* ── 밥 배너 ── */
.food-banner {
  position: absolute;
  top: calc(var(--header-h, 58px) - 0.6em);
  left: 45%;
  right: 0;
  z-index: 100;
  font-family: 'DOSGothic', monospace;
  font-size: clamp(28px, 4vw, 52px);
  color: #a8e063;
  line-height: 1.1;
  pointer-events: none;
  letter-spacing: -0.01em;
  mix-blend-mode: difference;
  white-space: nowrap;
}

.food-banner .pilgi {
  font-family: 'DOSPilgi', monospace;
}

/* ── 지도 뷰 ── */
.map-view {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.map-view.hidden { display: none; }

.photo-card {
  width: 100%;
  cursor: pointer;
}

/* 4:5 비율 강제 — padding-top 트릭 */
.photo-card-inner {
  position: relative;
  width: 100%;
  padding-top: 125%; /* 4:5 = 125% */
  overflow: hidden;
  background: #e8e2d6;
}

.photo-card-inner img,
.photo-card-inner .placeholder {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.photo-card-inner img {
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}

.photo-card:hover .photo-card-inner img { transform: scale(1.03); }
.photo-card:hover .photo-card-inner { background: #ddd6c8; }

/* 플레이스홀더 */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.placeholder-city {
  font-family: 'DOSPilgi', monospace;
  font-size: 11px;
  color: var(--ink-mid);
  text-align: center;
  padding: 0 8px;
}

.placeholder-emoji {
  font-size: 28px;
  line-height: 1;
}

.photo-tags {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: flex-end;
  z-index: 1;
}

.photo-tag {
  font-family: 'DOSPilgi', monospace;
  font-size: 16px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}

.photo-location {
  position: absolute;
  bottom: 6px;
  left: 6px;
  font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
  font-size: 18px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  z-index: 1;
}

/* ── About 뷰 ── */
.about-view {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 3rem 4rem;
  display: none;
  font-family: 'Pretendard', sans-serif;
  color: var(--ink);
}

.about-view.visible { display: block; }

.about-view p {
  font-size: 15px;
  line-height: 1.9;
  color: rgba(26,26,26,0.7);
  max-width: 600px;
  margin-bottom: 1.5rem;
}

#map { width: 100%; height: 100%; }

.leaflet-control-zoom {
  border: 0.5px solid var(--ink-faint) !important;
  border-radius: 6px !important;
  overflow: hidden;
  box-shadow: none !important;
}

.leaflet-control-zoom a {
  background: var(--cream) !important;
  color: var(--ink) !important;
  border-bottom: 0.5px solid var(--ink-faint) !important;
  width: 28px !important;
  height: 28px !important;
  line-height: 28px !important;
}

.leaflet-control-attribution {
  font-size: 9px !important;
  background: rgba(240,235,224,0.8) !important;
  color: var(--ink-mid) !important;
  box-shadow: none !important;
}

.custom-marker {
  width: 16px;
  height: 16px;
  border: 2.5px solid white;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.custom-marker:hover { transform: scale(1.4); }

/* ── 지도 팝업 ── */
.map-popup {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 300px;
  background: transparent;
  z-index: 800;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  max-height: calc(100% - 40px);
  overflow-y: auto;
}

.map-popup.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.map-popup-location {
  font-family: 'DOSGothic', monospace;
  font-size: 18px;
  letter-spacing: 0.04em;
  color: var(--ink);
  padding: 0 0 6px;
  text-transform: uppercase;
}

.map-popup-media {
  width: 100%;
  aspect-ratio: 4 / 5;
  background: #e0d9cc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DOSPilgi', monospace;
  font-size: 13px;
  color: var(--ink-mid);
  overflow: hidden;
}

.map-popup-media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.map-popup-close-btn {
  position: sticky;
  top: 0;
  float: right;
  width: 28px;
  height: 28px;
  background: var(--ink);
  color: var(--cream);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DOSPilgi', monospace;
  z-index: 10;
  margin-left: auto;
}

/* ── 라이트박스 ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.88);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.lightbox.open { opacity: 1; pointer-events: all; }

.lightbox img {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
}

.lightbox-info {
  margin-top: 12px;
  display: flex;
  gap: 16px;
  align-items: center;
  font-family: 'Pretendard', sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.06em;
}

.lightbox-placeholder {
  width: 60vw;
  height: 60vh;
  background: #2a2a2a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DOSPilgi', monospace;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: transparent;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  font-family: 'DOSPilgi', monospace;
  opacity: 0.7;
}

.lightbox-close:hover { opacity: 1; }

/* ── 모바일 하단 탭바 (숨김 기본) ── */
.mobile-tabbar {
  display: none;
}

/* ── 모바일 반응형 ── */
@media (max-width: 768px) {

  /* 사이드바 숨기기 */
  .sidebar { display: none; }

  /* 하단 탭바 표시 */
  .mobile-tabbar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(2, 1fr);
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--cream);
    border-top: 0.5px solid var(--ink-faint);
    z-index: 900;
    padding: 6px 4px;
    padding-bottom: calc(6px + env(safe-area-inset-bottom));
    gap: 2px;
  }

  .mobile-tabbar .icon-btn {
    font-size: 20px;
    padding: 4px;
  }

  /* 갤러리 3열, 하단 탭바 높이만큼 패딩 */
  .gallery-view {
    grid-template-columns: repeat(5, 1fr);
    padding-bottom: 100px;
  }

  /* 지도 하단 탭바 높이만큼 패딩 */
  .map-view {
    padding-bottom: 90px;
  }

  /* 지도 팝업 모바일 */
  .map-popup {
    top: 60px;
    bottom: 100px;
    right: 10px;
    left: 10px;
    width: auto;
    max-height: calc(100% - 160px);
  }

  /* 헤더 작게 */
  header {
    padding: 10px 16px;
  }

  .header-globe { font-size: 22px; }
  .header-title { font-size: 16px; }
}

</style>
</head>
<body>

<div class="layout">
  <header>
    <span class="header-globe" onclick="goMap()" style="cursor:pointer;">&#x1F30D;</span>
    <span class="header-title" onclick="goHome()" style="cursor:pointer;">reef.and.roots</span>
    <span class="header-subtitle">(plant-based nomad diver!)</span>
    <a href="https://www.instagram.com/tribi.day/" target="_blank" rel="noopener noreferrer"
       onclick="event.stopPropagation();"
       style="margin-left:auto; font-family:'DOSGothic',monospace; font-size:16px;
              color:var(--ink-mid); text-decoration:none; letter-spacing:0.04em;">
      @tribi.day
    </a>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-icons">
        <button class="icon-btn" data-tag="나"      onclick="handleIcon(this)">&#x1F478;</button>
        <button class="icon-btn" data-tag="밥"      onclick="handleIcon(this)">&#x1F367;</button>
        <button class="icon-btn" data-tag="강아지"  onclick="handleIcon(this)">&#x1F436;</button>

        <button class="icon-btn" data-tag="책"      onclick="handleIcon(this)">&#x1F4D6;</button>
        <button class="icon-btn" data-tag="예술"    onclick="handleIcon(this)">&#x1F496;</button>
      </div>
      <div class="sidebar-bottom">
        <button class="about-btn" id="aboutBtn" onclick="toggleAbout()">&#x003F;</button>
      </div>
    </aside>

    <div class="content">
      <div class="gallery-view" id="galleryView"></div>

      <div class="map-view hidden" id="mapView">
        <div id="map"></div>
        <div class="map-popup" id="mapPopup">
          <div class="map-popup-location" id="mapPopupLocation"></div>
          <div id="mapPopupMedia"></div>
        </div>
      </div>

      <div class="about-view" id="aboutView">
        <p>tribi.travel.archive는 하루의 여행 기록 아카이브입니다.</p>
        <p>아프리카를 제외한 모든 대륙을 여행하며 찍은 사진들을 태그별로 분류하고, 지도 위에 핀으로 기록합니다. 좌측 아이콘을 눌러 카테고리별 사진을 탐색하거나, 지구 아이콘을 눌러 전체 여행 지도를 확인해보세요.</p>
        <p>현재 진행 중인 여행의 기록도 실시간으로 업데이트됩니다.</p>
        <p>인스타그램 <a href="https://www.instagram.com/tribi.day/" target="_blank" style="color:var(--caramel);">@tribi.day</a> 에서도 만날 수 있습니다.</p>
      </div>

</div>

<script>

// ──────────────────────────────────────────
// 노션에서 사진 데이터 불러오기
// ──────────────────────────────────────────
let photos = [];

async function loadPhotos() {
  try {
    const res = await fetch('/api/photos');
    photos = await res.json();
  } catch (err) {
    console.error('노션 데이터 로드 실패:', err);
    photos = [];
  }
}

const tagIcon = {

  if (!tags || tags.length === 0) return "#aaa";
  return tagColor[tags[0]] || "#aaa";
}

// 나라 → 국기 이모지
const countryFlag = {

function optimizeUrl(url) {
  if (!url || !url.includes('cloudinary.com')) return url;
  return url.replace('/upload/', '/upload/q_auto,f_auto,w_800,a_exif,fl_force_strip/');
}

// ── 갤러리 렌더링 ──
function renderGallery(filterTag = null) {
  const view = document.getElementById('galleryView');
  let filtered = filterTag
    ? photos.filter(p => p.tags.includes(filterTag))
    : [...photos];

  // 랜덤 정렬
  filtered.sort(() => Math.random() - 0.5);

  view.innerHTML = '';

  // 밥 태그 배너 (이전 배너 제거 후 추가)
  const existing = document.getElementById('foodBanner');
  if (existing) existing.remove();

  if (filterTag === '밥') {
    const banner = document.createElement('div');
    banner.className = 'food-banner';
    banner.id = 'foodBanner';
    banner.innerHTML = `(almost) <span class="pilgi">everything</span> is VEGAN !`;
    const header = document.querySelector('header');
    const headerH = header.getBoundingClientRect().height;
    const fontSize = parseFloat(getComputedStyle(banner).fontSize || '40');
    banner.style.top = (headerH - fontSize * 0.5) + 'px';
    document.querySelector('.layout').appendChild(banner);
  }
  filtered.forEach((photo, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.onclick = () => openLightbox(photo);

    const inner = document.createElement('div');
    inner.className = 'photo-card-inner';

    if (photo.file) {
      const img = document.createElement('img');
      img.src = optimizeUrl(photo.file);
      img.alt = photo.city;
      img.loading = 'lazy';
      inner.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      const emoji = document.createElement('div');
      emoji.className = 'placeholder-emoji';
      emoji.textContent = tagIcon[photo.tags[0]] || '📷';
      const city = document.createElement('div');
      city.className = 'placeholder-city';
      city.textContent = photo.city;
      ph.appendChild(emoji);
      ph.appendChild(city);
      inner.appendChild(ph);
    }

    const tagsEl = document.createElement('div');
    tagsEl.className = 'photo-tags';
    photo.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'photo-tag';
      span.textContent = tagIcon[tag] || '';
      tagsEl.appendChild(span);
    });
    inner.appendChild(tagsEl);

    // 국기
    if (photo.country) {
      const loc = document.createElement('div');
      loc.className = 'photo-location';
      loc.textContent = countryFlag[photo.country] || '';
      inner.appendChild(loc);
    }

    card.appendChild(inner);
    view.appendChild(card);
  });
}

// ── 지도 ──
let mapInitialized = false;
let leafletMap = null;
let markers = [];

function initMap(filterTag) {
  if (!mapInitialized) {
    leafletMap = L.map('map', {
      center: [20, 10],
      zoom: 2,
      zoomSnap: 0.5,
      worldCopyJump: false,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(leafletMap);
    leafletMap.on('click', () => closeMapPopup());
    mapInitialized = true;
  }

  markers.forEach(m => m.remove());
  markers = [];

  const filtered = filterTag ? photos.filter(p => p.tags.includes(filterTag)) : photos;

  if (filterTag) {
    // 태그 필터 있을 때 → 도시별로 묶기, 색상은 필터 태그로 고정
    const color = tagColor[filterTag] || "#aaa";
    const cityMap = {};
    filtered.forEach(photo => {
      const key = `${photo.city}_${photo.country}`;
      if (!cityMap[key]) cityMap[key] = { ...photo, photos: [] };
      cityMap[key].photos.push(photo);
    });

    Object.values(cityMap).forEach(city => {
      const icon = L.divIcon({
        className: '',
        html: `<div class="custom-marker" style="background:${color};"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });
      const marker = L.marker([city.lat, city.lng], { icon });
      marker.on('click', () => openMapPopup(city));
      marker.addTo(leafletMap);
      markers.push(marker);
    });
  } else {
    // 전체 지도 → 사진마다 개별 핀
    filtered.forEach(photo => {
      const color = getTagColor(photo.tags);
      const icon = L.divIcon({
        className: '',
        html: `<div class="custom-marker" style="background:${color};"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });
      const marker = L.marker([photo.lat, photo.lng], { icon });
      marker.on('click', () => openMapPopup({ ...photo, photos: [photo] }));
      marker.addTo(leafletMap);
      markers.push(marker);
    });
  }

  setTimeout(() => {
    leafletMap.invalidateSize();
    if (!filterTag) leafletMap.fitWorld();
  }, 300);
}

// ── 아이콘 클릭 ──
let activeTag = null;
let clickCount = 0;

function handleIcon(btn) {
  const tag = btn.dataset.tag;

  if (activeTag !== tag) {
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
    // 같은 태그 버튼 모두 active (사이드바+탭바)
    document.querySelectorAll(`.icon-btn[data-tag="${tag}"]`).forEach(b => b.classList.add('active'));
    activeTag = tag;
    clickCount = 1;
    closeMapPopup();
    showMap(tag);
  } else {
    clickCount++;
    if (clickCount === 2) {
      showGallery(tag);
    } else {
      document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
      activeTag = null;
      clickCount = 0;
      showGallery();
    }
  }
}

function toggleAbout() {
  const aboutView = document.getElementById('aboutView');
  const aboutBtn = document.getElementById('aboutBtn');
  const isVisible = aboutView.classList.contains('visible');

  if (isVisible) {
    aboutView.classList.remove('visible');
    aboutBtn.classList.remove('active');
    showGallery();
  } else {
    document.getElementById('galleryView').classList.add('hidden');
    document.getElementById('mapView').classList.add('hidden');
    aboutView.classList.add('visible');
    aboutBtn.classList.add('active');
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
  }
}

function goMap() {
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
  activeTag = null;
  clickCount = 0;
  showMap(null);
}

function goHome() {
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
  activeTag = null;
  clickCount = 0;
  showGallery();
}

function showGallery(tag = null) {
  document.getElementById('galleryView').classList.remove('hidden');
  document.getElementById('mapView').classList.add('hidden');
  document.getElementById('aboutView').classList.remove('visible');
  document.getElementById('aboutBtn').classList.remove('active');
  const existing = document.getElementById('foodBanner');
  if (existing) existing.remove();
  renderGallery(tag);
}

function showMap(tag = null) {
  document.getElementById('galleryView').classList.add('hidden');
  document.getElementById('mapView').classList.remove('hidden');
  document.getElementById('aboutView').classList.remove('visible');
  document.getElementById('aboutBtn').classList.remove('active');
  const existing = document.getElementById('foodBanner');
  if (existing) existing.remove();
  setTimeout(() => {
    initMap(tag);
    if (leafletMap) leafletMap.invalidateSize();
  }, 200);
}

// ── 지도 팝업 ──
function openMapPopup(city) {
  document.getElementById('mapPopupLocation').textContent =
    `${city.country}, ${city.city}`;

  const mediaEl = document.getElementById('mapPopupMedia');
  mediaEl.innerHTML = '';
  mediaEl.style = '';

  const cityPhotos = city.photos.filter(p => p.file);

  if (cityPhotos.length > 0) {
    cityPhotos.forEach(photo => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'width:100%; aspect-ratio:4/5; overflow:hidden; margin-bottom:4px;';
      const img = document.createElement('img');
      img.src = optimizeUrl(photo.file);
      img.alt = city.city;
      img.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block;';
      wrap.appendChild(img);
      mediaEl.appendChild(wrap);
    });
  } else {
    mediaEl.style.fontSize = '13px';
    mediaEl.textContent = city.city;
  }

  document.getElementById('mapPopup').classList.add('open');
  leafletMap.panTo([city.lat, city.lng], { animate: true, duration: 0.5 });
}

function closeMapPopup() {
  document.getElementById('mapPopup').classList.remove('open');
}

// ── 라이트박스 ──
function openLightbox(photo) {
  const content = document.getElementById('lightboxContent');
  const info = document.getElementById('lightboxInfo');

  if (photo.file) {
    content.innerHTML = `<img src="${optimizeUrl(photo.file)}" alt="${photo.city}" style="max-width:90vw;max-height:85vh;object-fit:contain;">`;
  } else {
    content.innerHTML = `<div style="width:60vw;height:60vh;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-family:DOSPilgi,monospace;color:rgba(255,255,255,0.4);font-size:14px;">${photo.city}</div>`;
  }

  // 날짜 포맷
  let dateText = '';
  if (photo.date) {
    const d = photo.date.replace(/-/g, '');
    if (d.length === 8) {
      dateText = `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
    } else {
      dateText = photo.date;
    }
  }

  const flag = countryFlag[photo.country] || '';
  info.innerHTML = `
    ${dateText ? `<span>${dateText}</span>` : ''}
    ${photo.city ? `<span>${flag} ${photo.city}, ${photo.country}</span>` : ''}
  `;

  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// ── 초기 실행 ──
(async () => {
  const gallery = document.getElementById('galleryView');
  gallery.innerHTML = '<div style="padding:2rem; font-family:Pretendard,sans-serif; font-size:13px; color:rgba(26,26,26,0.4); grid-column:1/-1;">loading...</div>';
  await loadPhotos();
  renderGallery();
})();

</script>
