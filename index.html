<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tribi.travel.archive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>

@font-face {
  font-family: 'Tribi';
  src: url('fonts/Tribi_eng.ttf') format('truetype');
}
@font-face {
  font-family: 'DOSPilgi';
  src: url('fonts/DOSPilgi.ttf') format('truetype');
}
@font-face {
  font-family: 'Retrograde';
  src: url('fonts/Retrograde-Regular.otf') format('opentype');
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f0ebe0;
  --ink: #1a1a1a;
  --ink-mid: rgba(26,26,26,0.45);
  --ink-faint: rgba(26,26,26,0.12);
  --caramel: #b8864e;
  --sidebar-w: 110px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: 'DOSPilgi', monospace;
}

/* ── 전체 레이아웃 ── */
.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── 헤더 ── */
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 0.5px solid var(--ink-faint);
  flex-shrink: 0;
}

.header-globe {
  font-family: 'DOSPilgi', monospace;
  font-size: 22px;
  line-height: 1;
}

.header-title {
  font-family: 'Tribi', sans-serif;
  font-size: 18px;
  letter-spacing: 0.04em;
  color: var(--ink);
}

/* ── 메인 영역 ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── 사이드바 ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  border-right: 0.5px solid var(--ink-faint);
  padding: 16px 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(5, auto);
  gap: 4px;
  align-content: start;
}

.icon-btn {
  font-family: 'DOSPilgi', monospace;
  font-size: 26px;
  line-height: 1;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  text-align: center;
  transition: background 0.15s;
  color: var(--ink);
  filter: grayscale(1);
  opacity: 0.5;
}

.icon-btn:hover {
  background: rgba(26,26,26,0.06);
  opacity: 0.8;
}

.icon-btn.active {
  filter: none;
  opacity: 1;
  background: rgba(26,26,26,0.08);
}

/* ── 콘텐츠 영역 ── */
.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ── 갤러리 뷰 ── */
.gallery-view {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 6px;
  align-content: start;
}

.gallery-view.hidden { display: none; }

.photo-card {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  cursor: pointer;
  background: var(--ink-faint);
}

.photo-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}

.photo-card:hover img { transform: scale(1.03); }

.photo-tags {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.photo-tag {
  font-family: 'DOSPilgi', monospace;
  font-size: 16px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}

/* ── 지도 뷰 ── */
.map-view {
  width: 100%;
  height: 100%;
  position: relative;
}

.map-view.hidden { display: none; }

#map {
  width: 100%;
  height: 100%;
}

/* Leaflet 커스텀 */
.leaflet-control-zoom {
  border: 0.5px solid var(--ink-faint) !important;
  border-radius: 6px !important;
  overflow: hidden;
  box-shadow: none !important;
}

.leaflet-control-zoom a {
  background: var(--cream) !important;
  color: var(--ink) !important;
  border-bottom: 0.5px solid var(--ink-faint) !important;
  font-family: 'DOSPilgi', monospace !important;
  width: 28px !important;
  height: 28px !important;
  line-height: 28px !important;
}

.leaflet-control-attribution {
  font-size: 9px !important;
  background: rgba(240,235,224,0.8) !important;
  color: var(--ink-mid) !important;
  box-shadow: none !important;
}

.custom-marker {
  width: 10px;
  height: 10px;
  background: var(--caramel);
  border: 2px solid white;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.15s;
}

.custom-marker:hover { transform: scale(1.5); }

/* ── 지도 위 사진 팝업 ── */
.map-popup {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 380px;
  background: var(--cream);
  z-index: 800;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.map-popup.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.map-popup-location {
  font-family: 'Retrograde', monospace;
  font-size: 22px;
  letter-spacing: 0.06em;
  color: var(--ink);
  padding: 0 0 8px;
  text-transform: uppercase;
}

.map-popup-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
}

.map-popup-close {
  position: absolute;
  top: 0; right: 0;
  width: 28px; height: 28px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DOSPilgi', monospace;
  z-index: 10;
}

/* 갤러리 사진 팝업 (라이트박스) */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.85);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.lightbox.open {
  opacity: 1;
  pointer-events: all;
}

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
}

.lightbox-close {
  position: absolute;
  top: 20px; right: 20px;
  background: transparent;
  border: none;
  color: white;
  font-size: 28px;
  cursor: pointer;
  font-family: 'DOSPilgi', monospace;
}

</style>
</head>
<body>

<div class="layout">

  <!-- 헤더 -->
  <header>
    <span class="header-globe">&#x1F30D;</span>
    <span class="header-title">tribi.travel.archive</span>
  </header>

  <div class="main">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <!-- 나 -->
      <button class="icon-btn" data-tag="나" onclick="handleIcon(this)" title="나">&#x1F478;</button>
      <!-- 밥 -->
      <button class="icon-btn" data-tag="밥" onclick="handleIcon(this)" title="밥">&#x1F367;</button>
      <!-- 강아지 -->
      <button class="icon-btn" data-tag="강아지" onclick="handleIcon(this)" title="강아지">&#x1F436;</button>
      <!-- 고양이 -->
      <button class="icon-btn" data-tag="고양이" onclick="handleIcon(this)" title="고양이">&#x1F431;</button>
      <!-- 바다 -->
      <button class="icon-btn" data-tag="바다" onclick="handleIcon(this)" title="바다">&#x1F420;</button>
      <!-- 밤 -->
      <button class="icon-btn" data-tag="밤" onclick="handleIcon(this)" title="밤">&#x1F304;</button>
      <!-- 공원 -->
      <button class="icon-btn" data-tag="공원" onclick="handleIcon(this)" title="공원">&#x1F334;</button>
      <!-- 숙소 -->
      <button class="icon-btn" data-tag="숙소" onclick="handleIcon(this)" title="숙소">&#x1F3DA;</button>
      <!-- 산 -->
      <button class="icon-btn" data-tag="산" onclick="handleIcon(this)" title="산">&#x1F30C;</button>
      <!-- 비행기 -->
      <button class="icon-btn" data-tag="비행기" onclick="handleIcon(this)" title="비행기">&#x1F6E9;</button>
    </aside>

    <!-- 콘텐츠 -->
    <div class="content">

      <!-- 갤러리 뷰 -->
      <div class="gallery-view" id="galleryView"></div>

      <!-- 지도 뷰 -->
      <div class="map-view hidden" id="mapView">
        <div id="map"></div>
        <div class="map-popup" id="mapPopup">
          <button class="map-popup-close" onclick="closeMapPopup()">×</button>
          <div class="map-popup-location" id="mapPopupLocation"></div>
          <img class="map-popup-img" id="mapPopupImg" src="" alt="">
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ──────────────────────────────────────────
// 사진 데이터
// 사진 추가할 때 여기에만 추가하면 돼!
// tags: ["나","밥","강아지","고양이","바다","밤","공원","숙소","산","비행기"]
// ──────────────────────────────────────────
const photos = [
  {
    file: "images/curitiba_capybara.jpg",
    city: "Curitiba",
    country: "Brazil",
    lat: -25.4284,
    lng: -49.2733,
    tags: ["나", "공원"],
  },
  // 여기에 사진 추가!
  // { file: "images/파일명.jpg", city: "도시명", country: "나라", lat: 위도, lng: 경도, tags: ["태그"] },
];

// 태그 → 아이콘 유니코드 매핑
const tagIcon = {
  "나":    "\u{1F478}",
  "밥":    "\u{1F367}",
  "강아지": "\u{1F436}",
  "고양이": "\u{1F431}",
  "바다":  "\u{1F420}",
  "밤":    "\u{1F304}",
  "공원":  "\u{1F334}",
  "숙소":  "\u{1F3DA}",
  "산":    "\u{1F30C}",
  "비행기": "\u{1F6E9}",
};

// ── 갤러리 렌더링 ──
function renderGallery(filterTag = null) {
  const view = document.getElementById('galleryView');
  const filtered = filterTag
    ? photos.filter(p => p.tags.includes(filterTag))
    : photos;

  view.innerHTML = '';
  filtered.forEach(photo => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.onclick = () => openLightbox(photo.file);

    const img = document.createElement('img');
    img.src = photo.file;
    img.alt = photo.city;
    img.loading = 'lazy';

    const tagsEl = document.createElement('div');
    tagsEl.className = 'photo-tags';
    photo.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'photo-tag';
      span.textContent = tagIcon[tag] || '';
      tagsEl.appendChild(span);
    });

    card.appendChild(img);
    card.appendChild(tagsEl);
    view.appendChild(card);
  });
}

// ── 지도 초기화 ──
let mapInitialized = false;
let leafletMap = null;
let markers = [];

function initMap(filterTag) {
  if (!mapInitialized) {
    leafletMap = L.map('map', {
      center: [20, 10],
      zoom: 2,
      zoomControl: true,
      scrollWheelZoom: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(leafletMap);

    mapInitialized = true;
  }

  // 마커 초기화
  markers.forEach(m => m.remove());
  markers = [];

  const filtered = filterTag
    ? photos.filter(p => p.tags.includes(filterTag))
    : photos;

  // 도시별로 그룹핑
  const cityMap = {};
  filtered.forEach(photo => {
    const key = `${photo.city}_${photo.country}`;
    if (!cityMap[key]) cityMap[key] = { ...photo, photos: [] };
    cityMap[key].photos.push(photo);
  });

  Object.values(cityMap).forEach(city => {
    const icon = L.divIcon({
      className: '',
      html: '<div class="custom-marker"></div>',
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });

    const marker = L.marker([city.lat, city.lng], { icon });
    marker.on('click', () => openMapPopup(city));
    marker.addTo(leafletMap);
    markers.push(marker);
  });

  setTimeout(() => leafletMap.invalidateSize(), 100);
}

// ── 아이콘 클릭 핸들러 ──
let activeTag = null;
let mapMode = false;

function handleIcon(btn) {
  const tag = btn.dataset.tag;

  if (activeTag === tag && mapMode) {
    // 같은 아이콘 다시 클릭 → 갤러리로 돌아가기
    activeTag = null;
    mapMode = false;
    btn.classList.remove('active');
    showGallery();
    return;
  }

  // 모든 아이콘 비활성화
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (activeTag === tag && !mapMode) {
    // 갤러리에서 같은 태그 → 지도로 전환
    mapMode = true;
    activeTag = tag;
    showMap(tag);
  } else {
    // 새 태그 선택 → 갤러리 필터링
    activeTag = tag;
    mapMode = false;
    showGallery(tag);
  }
}

function showGallery(tag = null) {
  document.getElementById('galleryView').classList.remove('hidden');
  document.getElementById('mapView').classList.add('hidden');
  renderGallery(tag);
}

function showMap(tag = null) {
  document.getElementById('galleryView').classList.add('hidden');
  document.getElementById('mapView').classList.remove('hidden');
  initMap(tag);
}

// ── 지도 팝업 ──
function openMapPopup(city) {
  const firstPhoto = city.photos[0];
  document.getElementById('mapPopupLocation').textContent = `${city.country}, ${city.city}`;
  document.getElementById('mapPopupImg').src = firstPhoto.file;
  document.getElementById('mapPopup').classList.add('open');
  leafletMap.panTo([city.lat, city.lng], { animate: true, duration: 0.5 });
}

function closeMapPopup() {
  document.getElementById('mapPopup').classList.remove('open');
}

// ── 라이트박스 ──
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── 초기 렌더링 ──
renderGallery();

</script>
</body>
</html>
