<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tribi.travel.archive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>

@font-face {
  font-family: 'Tribi';
  src: url('./fonts/Tribi_eng.ttf') format('truetype');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DOSPilgi';
  src: url('./fonts/DOSPilgi.ttf') format('truetype');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Retrograde';
  src: url('./fonts/Retrograde-Regular.otf') format('opentype');
  font-weight: normal;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f0ebe0;
  --ink: #1a1a1a;
  --ink-mid: rgba(26,26,26,0.45);
  --ink-faint: rgba(26,26,26,0.12);
  --caramel: #b8864e;
  --sidebar-w: 110px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: 'DOSPilgi', monospace;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  flex-shrink: 0;
}

.header-globe {
  font-family: 'DOSPilgi', monospace;
  font-size: 30px;
  line-height: 1;
}

.header-title {
  font-family: 'DOSPilgi', monospace;
  font-size: 24px;
  letter-spacing: 0.04em;
  color: var(--ink);
}


.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  padding: 16px 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  align-content: start;
}

.icon-btn {
  font-family: 'DOSPilgi', monospace;
  font-size: 22px;
  line-height: 1;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  text-align: center;
  transition: opacity 0.15s, filter 0.15s;
  filter: grayscale(1);
  opacity: 0.35;
}

.icon-btn:hover { opacity: 0.65; }
.icon-btn.active { filter: grayscale(1) brightness(0); opacity: 1; color: #e03030; }

.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ── 갤러리 ── */
.gallery-view {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-auto-rows: auto;
  gap: 6px;
  align-content: start;
}

.gallery-view.hidden { display: none; }

/* ── 지도 뷰 ── */
.map-view {
  width: 100%;
  height: 100%;
  position: relative;
}

.map-view.hidden { display: none; }

.photo-card {
  width: 100%;
  cursor: pointer;
}

/* 4:5 비율 강제 — padding-top 트릭 */
.photo-card-inner {
  position: relative;
  width: 100%;
  padding-top: 125%; /* 4:5 = 125% */
  overflow: hidden;
  background: #e8e2d6;
}

.photo-card-inner img,
.photo-card-inner .placeholder {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.photo-card-inner img {
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}

.photo-card:hover .photo-card-inner img { transform: scale(1.03); }
.photo-card:hover .photo-card-inner { background: #ddd6c8; }
.photos.sort(() => Math.random() - 0.5)
  
/* 플레이스홀더 */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.placeholder-city {
  font-family: 'DOSPilgi', monospace;
  font-size: 11px;
  color: var(--ink-mid);
  text-align: center;
  padding: 0 8px;
}

.placeholder-emoji {
  font-size: 28px;
  line-height: 1;
}

.photo-tags {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: flex-end;
  z-index: 1;
}

.photo-tag {
  font-family: 'DOSPilgi', monospace;
  font-size: 16px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px 8px 6px;
  background: linear-gradient(transparent, rgba(26,26,26,0.55));
  font-family: 'DOSPilgi', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.05em;
}

/* ── 지도 뷰 ── */
.map-view {
  width: 100%;
  height: 100%;
  position: relative;
}

.map-view.hidden { display: none; }

#map { width: 100%; height: 100%; }

.leaflet-control-zoom {
  border: 0.5px solid var(--ink-faint) !important;
  border-radius: 6px !important;
  overflow: hidden;
  box-shadow: none !important;
}

.leaflet-control-zoom a {
  background: var(--cream) !important;
  color: var(--ink) !important;
  border-bottom: 0.5px solid var(--ink-faint) !important;
  width: 28px !important;
  height: 28px !important;
  line-height: 28px !important;
}

.leaflet-control-attribution {
  font-size: 9px !important;
  background: rgba(240,235,224,0.8) !important;
  color: var(--ink-mid) !important;
  box-shadow: none !important;
}

.custom-marker {
  width: 16px;
  height: 16px;
  background: #e03030;
  border: 2.5px solid white;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.custom-marker:hover { transform: scale(1.4); }

/* ── 지도 팝업 ── */
.map-popup {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 340px;
  background: var(--cream);
  z-index: 800;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  max-height: calc(100% - 40px);
  overflow-y: auto;
}

.map-popup.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.map-popup-location {
  font-family: 'Retrograde', 'DOSPilgi', monospace;
  font-size: 20px;
  letter-spacing: 0.06em;
  color: var(--ink);
  padding: 0 0 8px;
  text-transform: uppercase;
}

.map-popup-media {
  width: 100%;
  aspect-ratio: 4 / 5;
  background: #e0d9cc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DOSPilgi', monospace;
  font-size: 13px;
  color: var(--ink-mid);
  overflow: hidden;
}

.map-popup-media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.map-popup-close-btn {
  position: sticky;
  top: 0;
  float: right;
  width: 28px;
  height: 28px;
  background: var(--ink);
  color: var(--cream);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DOSPilgi', monospace;
  z-index: 10;
  margin-left: auto;
}

/* ── 라이트박스 ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.88);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.lightbox.open { opacity: 1; pointer-events: all; }

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
}

.lightbox-placeholder {
  width: 60vw;
  height: 60vh;
  background: #2a2a2a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DOSPilgi', monospace;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: transparent;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  font-family: 'DOSPilgi', monospace;
  opacity: 0.7;
}

.lightbox-close:hover { opacity: 1; }

/* ── 모바일 하단 탭바 (숨김 기본) ── */
.mobile-tabbar {
  display: none;
}

/* ── 모바일 반응형 ── */
@media (max-width: 768px) {

  /* 사이드바 숨기기 */
  .sidebar { display: none; }

  /* 하단 탭바 표시 */
  .mobile-tabbar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--cream);
    border-top: 0.5px solid var(--ink-faint);
    z-index: 900;
    padding: 6px 4px;
    padding-bottom: calc(6px + env(safe-area-inset-bottom));
    gap: 2px;
  }

  .mobile-tabbar .icon-btn {
    font-size: 20px;
    padding: 4px;
  }

  /* 갤러리 3열, 하단 탭바 높이만큼 패딩 */
  .gallery-view {
    grid-template-columns: repeat(3, 1fr);
    padding-bottom: 100px;
  }

  /* 지도 하단 탭바 높이만큼 패딩 */
  .map-view {
    padding-bottom: 90px;
  }

  /* 지도 팝업 모바일 */
  .map-popup {
    top: 60px;
    bottom: 100px;
    right: 10px;
    left: 10px;
    width: auto;
    max-height: calc(100% - 160px);
  }

  /* 헤더 작게 */
  header {
    padding: 10px 16px;
  }

  .header-globe { font-size: 22px; }
  .header-title { font-size: 16px; }
}

</style>
</head>
<body>

<div class="layout">
  <header onclick="goHome()" style="cursor: pointer;">
    <span class="header-globe">&#x1F30D;</span>
    <span class="header-title">tribi.travel.archive</span>
  </header>

  <div class="main">
    <aside class="sidebar">
      <button class="icon-btn" data-tag="나"    onclick="handleIcon(this)">&#x1F478;</button>
      <button class="icon-btn" data-tag="밥"    onclick="handleIcon(this)">&#x1F367;</button>
      <button class="icon-btn" data-tag="강아지" onclick="handleIcon(this)">&#x1F436;</button>
      <button class="icon-btn" data-tag="고양이" onclick="handleIcon(this)">&#x1F431;</button>
      <button class="icon-btn" data-tag="바다"  onclick="handleIcon(this)">&#x1F420;</button>
      <button class="icon-btn" data-tag="밤"    onclick="handleIcon(this)">&#x1F304;</button>
      <button class="icon-btn" data-tag="공원"  onclick="handleIcon(this)">&#x1F334;</button>
      <button class="icon-btn" data-tag="숙소"  onclick="handleIcon(this)">&#x1F3DA;</button>
      <button class="icon-btn" data-tag="산"    onclick="handleIcon(this)">&#x1F30C;</button>
      <button class="icon-btn" data-tag="비행기" onclick="handleIcon(this)">&#x1F6E9;</button>
    </aside>

    <div class="content">
      <div class="gallery-view" id="galleryView"></div>

      <div class="map-view hidden" id="mapView">
        <div id="map"></div>
        <div class="map-popup" id="mapPopup">
        <div class="map-popup-close-btn" onclick="closeMapPopup()">×</div>
          <div class="map-popup-location" id="mapPopupLocation"></div>
          <div id="mapPopupMedia"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="mobile-tabbar">
  <button class="icon-btn" data-tag="나"    onclick="handleIcon(this)">&#x1F478;</button>
  <button class="icon-btn" data-tag="밥"    onclick="handleIcon(this)">&#x1F367;</button>
  <button class="icon-btn" data-tag="강아지" onclick="handleIcon(this)">&#x1F436;</button>
  <button class="icon-btn" data-tag="고양이" onclick="handleIcon(this)">&#x1F431;</button>
  <button class="icon-btn" data-tag="바다"  onclick="handleIcon(this)">&#x1F420;</button>
  <button class="icon-btn" data-tag="밤"    onclick="handleIcon(this)">&#x1F304;</button>
  <button class="icon-btn" data-tag="공원"  onclick="handleIcon(this)">&#x1F334;</button>
  <button class="icon-btn" data-tag="숙소"  onclick="handleIcon(this)">&#x1F3DA;</button>
  <button class="icon-btn" data-tag="산"    onclick="handleIcon(this)">&#x1F30C;</button>
  <button class="icon-btn" data-tag="비행기" onclick="handleIcon(this)">&#x1F6E9;</button>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div class="lightbox-placeholder" id="lightboxContent">no image</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ──────────────────────────────────────────
// 노션에서 사진 데이터 불러오기
// ──────────────────────────────────────────
let photos = [];

async function loadPhotos() {
  try {
    const res = await fetch('/api/photos');
    photos = await res.json();
  } catch (err) {
    console.error('노션 데이터 로드 실패:', err);
    photos = [];
  }
}

const tagIcon = {
  "나":    "\u{1F478}",
  "밥":    "\u{1F367}",
  "강아지": "\u{1F436}",
  "고양이": "\u{1F431}",
  "바다":  "\u{1F420}",
  "밤":    "\u{1F304}",
  "공원":  "\u{1F334}",
  "숙소":  "\u{1F3DA}",
  "산":    "\u{1F30C}",
  "비행기": "\u{1F6E9}",
};

// ── 갤러리 렌더링 ──
function renderGallery(filterTag = null) {
  const view = document.getElementById('galleryView');
  const filtered = filterTag
    ? photos.filter(p => p.tags.includes(filterTag))
    : photos;

  view.innerHTML = '';
  filtered.forEach((photo, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.onclick = () => openLightbox(photo);

    const inner = document.createElement('div');
    inner.className = 'photo-card-inner';

    if (photo.file) {
      const img = document.createElement('img');
      img.src = photo.file;
      img.alt = photo.city;
      img.loading = 'lazy';
      inner.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      const emoji = document.createElement('div');
      emoji.className = 'placeholder-emoji';
      emoji.textContent = tagIcon[photo.tags[0]] || '📷';
      const city = document.createElement('div');
      city.className = 'placeholder-city';
      city.textContent = photo.city;
      ph.appendChild(emoji);
      ph.appendChild(city);
      inner.appendChild(ph);
    }

    const tagsEl = document.createElement('div');
    tagsEl.className = 'photo-tags';
    photo.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'photo-tag';
      span.textContent = tagIcon[tag] || '';
      tagsEl.appendChild(span);
    });

    inner.appendChild(tagsEl);

    // 위치 표시
    if (photo.city) {
      const loc = document.createElement('div');
      loc.className = 'photo-location';
      loc.textContent = `${photo.city}, ${photo.country}`;
      inner.appendChild(loc);
    }

    card.appendChild(inner);
    view.appendChild(card);
  });
}

// ── 지도 ──
let mapInitialized = false;
let leafletMap = null;
let markers = [];

function initMap(filterTag) {
  if (!mapInitialized) {
    leafletMap = L.map('map', { center: [20, 10], zoom: 2 });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(leafletMap);
    mapInitialized = true;
  }

  markers.forEach(m => m.remove());
  markers = [];

  const filtered = filterTag ? photos.filter(p => p.tags.includes(filterTag)) : photos;
  const cityMap = {};
  filtered.forEach(photo => {
    const key = `${photo.city}_${photo.country}`;
    if (!cityMap[key]) cityMap[key] = { ...photo, photos: [] };
    cityMap[key].photos.push(photo);
  });

  Object.values(cityMap).forEach(city => {
    const icon = L.divIcon({
      className: '',
      html: '<div class="custom-marker"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });
    const marker = L.marker([city.lat, city.lng], { icon });
    marker.on('click', () => openMapPopup(city));
    marker.addTo(leafletMap);
    markers.push(marker);
  });

  setTimeout(() => leafletMap.invalidateSize(), 300);
}

// ── 아이콘 클릭 ──
let activeTag = null;
let clickCount = 0;

function handleIcon(btn) {
  const tag = btn.dataset.tag;

  if (activeTag !== tag) {
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
    // 같은 태그 버튼 모두 active (사이드바+탭바)
    document.querySelectorAll(`.icon-btn[data-tag="${tag}"]`).forEach(b => b.classList.add('active'));
    activeTag = tag;
    clickCount = 1;
    closeMapPopup();
    showMap(tag);
  } else {
    clickCount++;
    if (clickCount === 2) {
      showGallery(tag);
    } else {
      document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
      activeTag = null;
      clickCount = 0;
      showGallery();
    }
  }
}

function goHome() {
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
  activeTag = null;
  clickCount = 0;
  showGallery();
}

function showGallery(tag = null) {
  document.getElementById('galleryView').classList.remove('hidden');
  document.getElementById('mapView').classList.add('hidden');
  renderGallery(tag);
}

function showMap(tag = null) {
  document.getElementById('galleryView').classList.add('hidden');
  const mapView = document.getElementById('mapView');
  mapView.classList.remove('hidden');
  setTimeout(() => {
    initMap(tag);
    if (leafletMap) leafletMap.invalidateSize();
  }, 200);
}

// ── 지도 팝업 ──
function openMapPopup(city) {
  document.getElementById('mapPopupLocation').textContent =
    `${city.country}, ${city.city}`;

  const mediaEl = document.getElementById('mapPopupMedia');
  mediaEl.innerHTML = '';
  mediaEl.style = '';

  const cityPhotos = city.photos.filter(p => p.file);

  if (cityPhotos.length > 0) {
    cityPhotos.forEach(photo => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'width:100%; aspect-ratio:4/5; overflow:hidden; margin-bottom:4px;';
      const img = document.createElement('img');
      img.src = photo.file;
      img.alt = city.city;
      img.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block;';
      wrap.appendChild(img);
      mediaEl.appendChild(wrap);
    });
  } else {
    mediaEl.style.fontSize = '13px';
    mediaEl.textContent = city.city;
  }

  document.getElementById('mapPopup').classList.add('open');
  leafletMap.panTo([city.lat, city.lng], { animate: true, duration: 0.5 });
}

function closeMapPopup() {
  document.getElementById('mapPopup').classList.remove('open');
}

// ── 라이트박스 ──
function openLightbox(photo) {
  const content = document.getElementById('lightboxContent');
  if (photo.file) {
    content.outerHTML = `<img id="lightboxContent" src="${photo.file}" alt="${photo.city}" style="max-width:90vw;max-height:90vh;object-fit:contain;">`;
  } else {
    const el = document.getElementById('lightboxContent');
    el.textContent = `${photo.city} — ${photo.tags.join(', ')}`;
  }
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── 초기 실행 ──
(async () => {
  const gallery = document.getElementById('galleryView');
  gallery.innerHTML = '<div style="padding:2rem; font-family:DOSPilgi,monospace; font-size:13px; color:rgba(26,26,26,0.4);">loading...</div>';
  await loadPhotos();
  renderGallery();
})();

</script>
</body>
</html>
