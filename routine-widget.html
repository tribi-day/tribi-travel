<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>routine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 20px 16px;
    color: #1a1a1a;
  }
  .wrap { max-width: 380px; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

  .header {
    margin-bottom: 24px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 800;
  }
  .header-sub {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }

  .routine-row {
    margin-bottom: 18px;
  }
  .routine-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .routine-name {
    font-size: 14px;
    font-weight: 600;
  }
  .routine-pct {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .routine-pct.empty { color: #ccc; font-weight: 400; }
  .bar-track {
    width: 100%;
    height: 7px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #1a1a1a;
    border-radius: 4px;
    transition: width 0.8s ease;
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
(async () => {
  const wrap = document.getElementById('wrap');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;

  try {
    const r = await fetch(`/api/routine?year=${year}&month=${month}`);
    const d = await r.json();

    if (d.error) {
      wrap.innerHTML = `<div class="loading">${d.error}</div>`;
      return;
    }

    const routinesHTML = d.routines.map(routine => {
      const hasPct = routine.pct !== null && routine.pct !== undefined;
      const pctNum = hasPct ? Math.round(routine.pct * 100) : 0;
      return `
        <div class="routine-row">
          <div class="routine-top">
            <div class="routine-name">${routine.name}</div>
            <div class="routine-pct ${hasPct ? '' : 'empty'}">${hasPct ? pctNum + '%' : '-'}</div>
          </div>
          <div class="bar-track">
            <div class="bar-fill" data-pct="${pctNum}" style="width:0%"></div>
          </div>
        </div>
      `;
    }).join('');

    wrap.innerHTML = `
      <div class="header">
        <div class="header-title">${d.year}.${String(d.month).padStart(2,'0')} 루틴</div>
        <div class="header-sub">이번 달 루틴별 달성도</div>
      </div>
      ${routinesHTML}
    `;

    // 바 애니메이션
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);

  } catch (e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
