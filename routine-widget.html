<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>routine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 20px 16px;
    color: #1a1a1a;
  }
  .wrap { max-width: 460px; margin: 0 auto; }
  .loading { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

  .header {
    margin-bottom: 20px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 800;
    color: #5c2e1f;
  }

  .routine-row {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 8px;
    background: #f1ede9;
    min-height: 48px;
    display: flex;
    align-items: center;
  }
  .routine-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 10px;
    transition: width 0.8s ease;
  }
  .routine-content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
  }
  .routine-icon { font-size: 16px; flex-shrink: 0; }
  .routine-name {
    font-size: 14px;
    font-weight: 600;
    color: #4a2a1c;
    flex: 1;
  }
  .routine-pct {
    font-size: 15px;
    font-weight: 700;
    color: #4a2a1c;
    flex-shrink: 0;
  }
  .routine-pct.empty { color: #bbb; font-weight: 400; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">불러오는 중...</div>
</div>

<script>
const PALETTE = ['#d8cdf0', '#c9703a', '#e8e09a', '#9c9468', '#dba053', '#a8c4a2', '#e3a9a0'];
const ICONS = {
  '기상': '☀️', '독서': '📖', '쓰기': '🖌️', '헬스': '🏋️', '오피스': '💻', '카페': '☕',
};

function getIcon(name) {
  for (const key in ICONS) {
    if (name.includes(key)) return ICONS[key];
  }
  return '✦';
}

(async () => {
  const wrap = document.getElementById('wrap');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;

  try {
    const r = await fetch(`/api/routine?year=${year}&month=${month}`);
    const d = await r.json();

    if (d.error) {
      wrap.innerHTML = `<div class="loading">${d.error}</div>`;
      return;
    }

    const routinesHTML = d.routines.map((routine, i) => {
      const hasPct = routine.pct !== null && routine.pct !== undefined;
      const pctNum = hasPct ? Math.round(routine.pct) : 0;
      const color = PALETTE[i % PALETTE.length];
      const icon = getIcon(routine.name);
      return `
        <div class="routine-row">
          <div class="routine-fill" data-pct="${pctNum}" style="width:0%; background:${color};"></div>
          <div class="routine-content">
            <span class="routine-icon">${icon}</span>
            <span class="routine-name">${routine.name}</span>
            <span class="routine-pct ${hasPct ? '' : 'empty'}">${hasPct ? pctNum + '%' : '-'}</span>
          </div>
        </div>
      `;
    }).join('');

    wrap.innerHTML = `
      <div class="header">
        <div class="header-title">${d.year}. ${d.month}. routine tracker</div>
      </div>
      ${routinesHTML}
    `;

    setTimeout(() => {
      document.querySelectorAll('.routine-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);

  } catch (e) {
    wrap.innerHTML = '<div class="loading">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
